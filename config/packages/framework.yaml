# see https://symfony.com/doc/current/reference/configuration/framework.html
framework:
    secret: '%env(APP_SECRET)%'
    csrf_protection: true
    http_method_override: false
    handle_all_throwables: true
    enabled_locales: ['en', 'ro', 'ja', 'ko', 'de', 'fr', 'zh', 'es']

    profiler:
        enabled: true
        collect: true

    session:
        handler_id: null
        name: OKTODARKSESSID
        cookie_secure: auto
        cookie_samesite: lax
        gc_maxlifetime: 2592000
        cookie_lifetime: 2592000
        storage_factory_id: session.storage.factory.native

    esi: true
    fragments: true
    php_errors:
        log: true
    ide: null

    property_info:
        with_constructor_extractor: false

    router:
        utf8: true
        # Configure the default URI to use when generating URLs in a console command or messenger message
        # or when the RequestContext is not available from the main request.
        # This is the correct option for your Symfony version.
        default_uri: '%env(MAILER_URL_SCHEME)%://%env(MAILER_URL_HOST)%'

when@test:
    framework:
        test: true
        session:
            storage_factory_id: session.storage.factory.mock_file
