# config/services.yaml
parameters:
    app.locale: en
    app.locales: en|ro
    app.notifications.email_sender: anonymous@example.com
    isLocked: false
    container.build_hash: 123
    php_bin: '%env(PHP_BIN)%'
    composer_bin: '%env(COMPOSER_BIN)%'
    avatars_directory: '%kernel.project_dir%/public/uploads/avatars'
    cv_directory: '%kernel.project_dir%/public/uploads/cvs'
    symfonycasts_reset_password.throttle_limit: 600

    # MAILERS
    mailer.from.jobs: '%env(MAILER_FROM_JOBS)%'
    mailer.from.contact: '%env(MAILER_FROM_CONTACT)%'
    mailer.from.no_reply: '%env(MAILER_FROM_NOREPLY)%'

services:
    _defaults:
        autowire: true
        autoconfigure: true
        bind:
            array $enabledLocales: '%kernel.enabled_locales%'
            string $locales: '%app.locales%'
            string $defaultLocale: '%app.locale%'

    App\:
      resource: '../src/'

    App\Service\EmailIdentityService:
        arguments:
            $jobs: '%mailer.from.jobs%'
            $contact: '%mailer.from.contact%'
            $noreply: '%mailer.from.no_reply%'

    App\Service\GeoIpService:
        arguments:
            $countryDbPath: '%kernel.project_dir%/var/geoip/GeoLite2-Country.mmdb'
            $cityDbPath: '%kernel.project_dir%/var/geoip/GeoLite2-City.mmdb'

    App\Service\SocialLinkParser:
        arguments:
            $social_base_urls: '%social_base_urls%'

    App\Twig\SocialExtension:
        arguments:
            $social_base_urls: '%social_base_urls%'
            $social_icons: '%social_icons%'
            $social_colors: '%social_colors%'
        tags: ['twig.extension']

    App\EventListener\ClientHintsListener:
        tags:
            - { name: kernel.event_listener, event: kernel.response }

    Symfony\Component\RateLimiter\RateLimiterFactory: '@limiter.resend_verification'

    App\Controller\RegistrationController:
        arguments:
            $resendVerificationLimiter: '@limiter.resend_verification'

    Symfony\Bridge\Doctrine\Security\RememberMe\DoctrineTokenProvider: ~

    App\Controller\ResetPasswordController:
      arguments:
        $throttleLimit: '%symfonycasts_reset_password.throttle_limit%'

    App\Controller\Admin\AdminToolsController:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\MessageHandler\CommandJobMessageHandler:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\EventSubscriber\CommentNotificationSubscriber:
        $sender: '%app.notifications.email_sender%'

    Symfony\Component\Security\Http\Logout\LogoutUrlGenerator: '@security.logout_url_generator'

  #######################################################################
  # THEME SYSTEM SERVICES
  #######################################################################

    App\Service\SettingsProvider: ~

    App\Twig\SettingsExtension:
        tags: ['twig.extension']

    App\Service\ThemeResolver: ~

    App\Twig\ThemeLoader:
        tags: ['twig.loader']

when@test:
    services:
        App\Service\SettingsProvider: null
        App\Service\ThemeResolver: null
        App\Twig\SettingsExtension: null
        App\Twig\ThemeLoader: null
