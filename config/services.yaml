# config/services.yaml
parameters:
    app.locale: en
    app.locales: 'en|ro|ja|ko|de|fr|zh|es'
    app.notifications.email_sender: anonymous@example.com
    isLocked: false
    container.build_hash: 123
    php_bin: '%env(PHP_BIN)%'
    composer_bin: '%env(COMPOSER_BIN)%'
    avatars_directory: '%kernel.project_dir%/public/uploads/avatars'
    cv_directory: '%kernel.project_dir%/public/uploads/cvs'
    symfonycasts_reset_password.throttle_limit: 600
    security.remember_me.lifetime: 604800

    # MAILERS
    mailer.from.jobs: '%env(MAILER_FROM_JOBS)%'
    mailer.from.contact: '%env(MAILER_FROM_CONTACT)%'
    mailer.from.no_reply: '%env(MAILER_FROM_NOREPLY)%'

services:
    _defaults:
        autowire: true
        autoconfigure: true
        bind:
            array $enabledLocales: '%kernel.enabled_locales%'
            string $locales: '%app.locales%'
            string $defaultLocale: '%app.locale%'

    App\:
      resource: '../src/'

    App\Service\EmailIdentityService:
        arguments:
            $jobs: '%mailer.from.jobs%'
            $contact: '%mailer.from.contact%'
            $noreply: '%mailer.from.no_reply%'

    App\Service\GeoIpService:
        arguments:
            $countryDbPath: '%kernel.project_dir%/var/geoip/GeoLite2-Country.mmdb'
            $cityDbPath: '%kernel.project_dir%/var/geoip/GeoLite2-City.mmdb'

    App\Service\SocialLinkParser:
        arguments:
            $social_base_urls: '%social_base_urls%'

    App\Twig\SocialExtension:
        arguments:
            $social_base_urls: '%social_base_urls%'
            $social_icons: '%social_icons%'
            $social_colors: '%social_colors%'
        tags: ['twig.extension']

    App\EventListener\ClientHintsListener:
        tags:
            - { name: kernel.event_listener, event: kernel.response }

    # ---------------------------------------------------------
    # External API Clients
    # ---------------------------------------------------------
    App\Service\TVMazeClient:
        arguments:
            $http: '@http_client'

    App\Service\TmdbService:
        arguments:
            $tmdbApiKey: '%env(TMDB_API_KEY)%'
            $cache: '@provider.cache'

    App\Service\TvdbService:
        arguments:
            $tvdbApiKey: '%env(TVDB_API_KEY)%'
            $cache: '@provider.cache'

    App\Service\TvMazeService:
        arguments:
            $cache: '@provider.cache'

    App\Service\StatsService:
        arguments:
            $cache: '@cache.app'

    # ---------------------------------------------------------
    #  Core Import Dispatcher
    # ---------------------------------------------------------
    App\Service\Import\ImportService: ~

    # ---------------------------------------------------------
    #  Movie Import
    # ---------------------------------------------------------
    App\Service\Import\Movie\MovieImportService: ~

    App\Service\Import\Movie\MovieImportHandler:
        tags: ['messenger.message_handler']

    # ---------------------------------------------------------
    #  TV Import
    # ---------------------------------------------------------
    App\Service\Import\Tv\TvImportService:
        public: true

    App\Service\Import\Tv\TvDuplicateMergeService: ~

    App\Service\Import\Tv\TvHierarchyBuilder: ~

    App\Service\Import\Tv\TvMetadataMerger: ~

    App\Service\Import\Tv\TvImportHandler:
        tags: ['messenger.message_handler']

    # ---------------------------------------------------------
    # TV Metadata Providers (chain: TMDB -> TVDB -> TVMaze)
    # TMDB: identity, images, cast, translations
    # TVDB: episodes, air dates, numbering
    # TVMaze: status, schedule, next episode
    # ---------------------------------------------------------
    App\Service\Import\Tv\Provider\TvMazeMetadataProvider: ~

    App\Service\Import\Tv\Provider\TvdbMetadataProvider: ~

    App\Service\Import\Tv\Provider\TmdbMetadataProvider: ~

    App\Service\Import\Tv\Provider\TvMetadataProviderChain:
        arguments:
            $providers:
                - '@App\Service\Import\Tv\Provider\TmdbMetadataProvider'
                - '@App\Service\Import\Tv\Provider\TvdbMetadataProvider'
                - '@App\Service\Import\Tv\Provider\TvMazeMetadataProvider'

    # ---------------------------------------------------------
    #  Season Import
    # ---------------------------------------------------------
    App\Service\Import\Season\SeasonImportService: ~

    App\Service\Import\Season\SeasonImportHandler:
        tags: ['messenger.message_handler']

    # ---------------------------------------------------------
    #  Episode Import
    # ---------------------------------------------------------
    App\Service\Import\Episode\EpisodeImportService: ~

    App\Service\Import\Episode\EpisodeImportHandler:
        tags: ['messenger.message_handler']

    # ---------------------------------------------------------
    # Movie Providers
    # ----------------------------------------------------------
    App\Service\Import\Movie\Provider\TvTimeMovieProvider: ~
    App\Service\Import\Movie\Provider\TraktMovieProvider: ~
    App\Service\Import\Movie\Provider\LetterboxdMovieProvider: ~
    App\Service\Import\Movie\Provider\SimklMovieProvider: ~
    App\Service\Import\Movie\Provider\CustomCsvMovieProvider: ~

    App\Service\Import\Movie\GlobalMovieImporter:
        arguments:
            $providers:
                - '@App\Service\Import\Movie\Provider\TvTimeMovieProvider'
                - '@App\Service\Import\Movie\Provider\TraktMovieProvider'
                - '@App\Service\Import\Movie\Provider\LetterboxdMovieProvider'
                - '@App\Service\Import\Movie\Provider\SimklMovieProvider'
                - '@App\Service\Import\Movie\Provider\CustomCsvMovieProvider'


    # ---------------------------------------------------------
    # Tv Providers
    # ---------------------------------------------------------
    App\Service\Import\Tv\Provider\TraktTvProvider:
        tags: ['app.tv_provider']

    App\Service\Import\Tv\Provider\TvTimeTvProvider:
        tags: ['app.tv_provider']

    App\Service\Import\Tv\Provider\SimklTvProvider:
        tags: ['app.tv_provider']

    App\Service\Import\Tv\Provider\GenericTvProvider:
        tags: ['app.tv_provider']

    App\Service\Import\Tv\Provider\TvProviderRegistry:
        arguments:
            $providers: !tagged_iterator app.tv_provider

    # ---------------------------------------------------------
    #  Metadata Services
    # ---------------------------------------------------------
    App\Service\Import\Metadata\MetadataLookupService: ~

    App\Service\Import\Metadata\MetadataMergeService: ~

    App\Service\Import\Metadata\MetadataHydrator: ~

    # ---------------------------------------------------------
    #  Extensible metadata providers (roadmap Phase 9)
    #  Add AniList / MAL / JustWatch / RottenTomatoes / Letterboxd
    #  by implementing MetadataProviderInterface and tagging below.
    # ---------------------------------------------------------
    App\Service\Import\Metadata\Provider\TmdbMetadataProvider:
        tags: ['app.metadata_provider']

    App\Service\Import\Metadata\Provider\MetadataProviderRegistry:
        arguments:
            $providers: !tagged_iterator app.metadata_provider

    # ---------------------------------------------------------
    #  Controller
    # ---------------------------------------------------------
    App\Controller\Tracker\Import\ImportController: ~

    # ---------------------------------------------------------
    # Rate Limiter
    # ---------------------------------------------------------
    Symfony\Component\RateLimiter\RateLimiterFactory: '@limiter.resend_verification'

    App\Controller\RegistrationController:
        arguments:
            $resendVerificationLimiter: '@limiter.resend_verification'

    Symfony\Bridge\Doctrine\Security\RememberMe\DoctrineTokenProvider: ~

    App\Controller\ResetPasswordController:
      arguments:
        $throttleLimit: '%symfonycasts_reset_password.throttle_limit%'

    App\Controller\Admin\AdminToolsController:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\MessageHandler\CommandJobMessageHandler:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\EventSubscriber\CommentNotificationSubscriber:
        $sender: '%app.notifications.email_sender%'

    # Explicitly configure the $sender argument for ForumSocialController
    # App\Controller\Forum\ForumSocialController:
    #    bind:
    #        $sender: '%app.notifications.email_sender%'

    # Explicitly configure the $sender argument for ForumThreadController
    # App\Controller\Forum\ForumThreadController:
    #    bind:
    #        $sender: '%app.notifications.email_sender%'

    Symfony\Component\Security\Http\Logout\LogoutUrlGenerator: '@security.logout_url_generator'

    App\EventListener\WorkflowSyncListener:
        tags:
            - { name: doctrine.event_listener, event: postUpdate }

    App\EventListener\BugAutomationListener:
        tags:
            - { name: doctrine.event_listener, event: postPersist }

  #######################################################################
  # THEME SYSTEM SERVICES
  #######################################################################

    App\Service\SettingsProvider: ~

    App\Twig\SettingsExtension:
        tags: ['twig.extension']

    App\Service\ThemeResolver: ~

    App\Twig\ThemeLoader:
        tags: ['twig.loader']

    App\Service\TrustedDeviceService:
        arguments:
            $rememberMeLifetime: '%security.remember_me.lifetime%'

when@test:
    services:
        App\Service\SettingsProvider: null
        App\Service\ThemeResolver: null
        App\Twig\SettingsExtension: null
        App\Twig\ThemeLoader: null
