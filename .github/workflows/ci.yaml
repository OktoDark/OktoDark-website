name: "CI"

on:
    pull_request:
      branches:
          - 'master'
    push:
        branches:
            - 'master'

env:
    fail-fast: true

permissions:
    contents: read

jobs:
    test:
        name: "${{ matrix.operating-system }} / PHP ${{ matrix.php-version }}"
        runs-on: ${{ matrix.operating-system }}
        continue-on-error: false

        strategy:
            matrix:
                operating-system: ['ubuntu-latest']
                php-version: ['8.4', '8.5']
                include:
                    - operating-system: 'macos-latest'
                      php-version: '8.4'
                    - operating-system: 'windows-latest'
                      php-version: '8.4'

        steps:
            - name: "Checkout code"
              uses: actions/checkout@v4

            - name: "Install PHP with extensions"
              uses: shivammathur/setup-php@v2
              with:
                  coverage: "none"
                  extensions: "gd, intl, mbstring, pdo_sqlite, zip"
                  php-version: ${{ matrix.php-version }}
                  tools: composer:v2

            - name: "Add PHPUnit matcher"
              run: echo "::add-matcher::${{ runner.tool_cache }}/phpunit.json"

            - name: "Remove GitHub OAuth token"
              run: composer config -g --unset github-oauth.github.com

            - name: "Cache Composer dependencies"
              uses: actions/cache@v4
              with:
                  path: vendor
                  key: ${{ runner.os }}-php-${{ matrix.php-version }}-${{ hashFiles('composer.lock') }}
                  restore-keys: |
                      ${{ runner.os }}-php-${{ matrix.php-version }}-

            - name: "Install dependencies"
              run: composer install --ansi --no-interaction --no-progress --prefer-dist

            - name: "Require symfony/flex"
              run: composer require symfony/flex --no-progress --no-scripts --no-plugins

            - name: "Run tests"
              run: vendor/bin/phpunit
