# Japanese Streaming Translations
streaming:
    title: "ライブストリーミング"
    twitch_desc: "ストリーミングのメインチャンネルです。"
    discord_desc: "提案/バグ報告やその他のディスカッションには、Discordがコミュニケーションの最良の手段です。"
    x_desc: "すべての視聴者とフォロワーへの素早くクリーンなメッセージ。"
    faq:
        title: "よくある質問"
        q1: "ストリーミングで何を見ることができ、どこで見られますか？"
        a1: "ストリーミングでは、Twitchチャンネルでのみ3Dモデリング、ゲーム制作などを見ることができます。"
        q2: "視聴は無料ですか？"
        a2: "はい、無料で視聴できます。"
        q3: "ストリーミングはいつ、どの曜日に始まりますか？"
        a3: "現在、ストリーミングに固定された日程はありません。"
        q4: "寄付しないといけませんか？"
        a4: "サブスクリプション（サポートメニューリンク参照）や他の方法で望めばチャンネルを支援できますが、任意です。"
