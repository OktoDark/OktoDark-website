privacy.subtitle: "当社が個人情報をどのように収集、使用、保存、保護するかをご確認ください。"
privacy.section: |
  <p class="text-light small mb-4">
    最終更新日：2029年05月29日
  </p>

  このプライバシーポリシーは、OktoDark Studios（以下「当社」）が、ウェブサイト、フォーラム、マーケットプレイス、ブログ、またはその他の関連サービス（以下「プラットフォーム」）のご利用時に、お客様の個人情報をどのように収集、使用、保存、保護するかを説明するものです。当社は、以下の主要なグローバルプライバシー規制を遵守しています：
  <ul class="list-marked">
      <li>EU 一般データ保護規則（GDPR）</li>
      <li>英国 GDPR</li>
      <li>カリフォルニア州消費者プライバシー法（CCPA/CPRA）</li>
      <li>カリフォルニア州オンラインプライバシー保護法（CalOPPA）</li>
      <li>児童オンラインプライバシー保護法（COPPA）</li>
      <li>米国連邦・州のプライバシー原則</li>
      <li>カナダ個人情報保護および電子文書法（PIPEDA）</li>
      <li>オーストラリア プライバシー法</li>
      <li>国際データ転送要件</li>
  </ul>
  プラットフォームをご利用いただくことで、このプライバシーポリシーに記載された取り扱いに同意したものとみなされます。
  <br><br>

  <dt class="heading-4">1. 収集する情報</dt>
  当社は、以下のカテゴリの情報を収集する場合があります：
  <br><br>
  <dt class="heading-5">1.1 お客様が直接提供する情報</dt>
  <ul class="list-marked">
      <li>氏名またはユーザー名</li>
      <li>メールアドレス</li>
      <li>パスワード（暗号化済み）</li>
      <li>プロフィール情報（アバター、自己紹介、SNSリンク）</li>
      <li>フォーラムの投稿、コメント、メッセージ</li>
      <li>マーケットプレイスへのアップロードとメタデータ</li>
      <li>サポートリクエストまたはフォームの送信内容</li>
  </ul>
  <br><br>
  <dt class="heading-5">1.2 自動的に収集される情報</dt>
  <ul class="list-marked">
      <li>IPアドレス</li>
      <li>ブラウザの種類とバージョン</li>
      <li>デバイス情報</li>
      <li>オペレーティングシステム</li>
      <li>参照元URL</li>
      <li>閲覧ページと行動履歴</li>
      <li>Cookie および追跡識別子</li>
  </ul>
  <br><br>
  <dt class="heading-5">1.3 任意情報</dt>
  <ul class="list-marked">
      <li>ニュースレターの購読</li>
      <li>通知設定</li>
      <li>マーケットプレイスの出品者情報</li>
      <li>支払い情報（第三者プロバイダーが処理；当社はカード情報を保存しません）</li>
  </ul>
  <br><br>

  <dt class="heading-4">2. 情報の利用目的</dt>
  当社は、お客様の情報を以下の目的で使用します：
  <ul class="list-marked">
      <li>アカウントの作成および管理</li>
      <li>フォーラム、マーケットプレイス、プラットフォーム機能へのアクセス提供</li>
      <li>利用体験のパーソナライズ</li>
      <li>ウェブサイトおよびサービスの改善</li>
      <li>サポートリクエストへの対応</li>
      <li>通知やアップデートの送信（有効時）</li>
      <li>詐欺、不正行為、セキュリティ脅威の防止</li>
      <li>法的義務の遵守</li>
  </ul>
  当社はお客様の個人情報を販売しません。
  <br><br>

  <dt class="heading-4">3. 処理の法的根拠（GDPR / 英国GDPR）</dt>
  EU/UK のユーザーに対して、当社は以下の法的根拠に基づいてデータを処理します：
  <ul class="list-marked">
      <li><strong>契約</strong> — プラットフォームへのアクセスを提供するため</li>
      <li><strong>同意</strong> — ニュースレター、Cookie、分析のため</li>
      <li><strong>正当な利益</strong> — プラットフォームを安全に改善するため</li>
      <li><strong>法的義務</strong> — 適用法を遵守するため</li>
  </ul>
  同意はいつでも撤回することができます。
  <br><br>

  <dt class="heading-4">4. Cookie および追跡技術</dt>
  当社は Cookie を以下の目的で使用します：
  <ul class="list-marked">
      <li>ユーザー設定の記憶</li>
      <li>ログインセッションの維持</li>
      <li>サイトトラフィックの分析</li>
      <li>ユーザー体験の向上</li>
      <li>マーケットプレイスおよびフォーラム機能の有効化</li>
  </ul>
  ブラウザの設定で Cookie を無効にすることができます。プラットフォームの動作に不可欠な Cookie は必要な場合があります。
  <br><br>

  <dt class="heading-4">5. 第三者サービス</dt>
  当社は、以下の目的で信頼できる第三者プロバイダーを利用することがあります：
  <ul class="list-marked">
      <li>分析（例：Google Analytics）</li>
      <li>広告（例：Google AdSense）</li>
      <li>決済処理</li>
      <li>メール配信</li>
      <li>セキュリティおよび不正防止システム</li>
  </ul>
  これらのプロバイダーは Cookie または追跡技術を使用する場合があります。当社は、分析や広告に必要な範囲を超えた第三者による行動追跡を許可しません。
  <br><br>

  <dt class="heading-4">6. データの共有</dt>
  当社はお客様の個人情報を販売または取引しません。データの共有は以下の場合に限られます：
  <ul class="list-marked">
      <li>当社の代わりに業務を行うサービスプロバイダー</li>
      <li>法律上必要とされる場合の当局</li>
      <li>マーケットプレイスの出品者（購入関連情報に限定）</li>
      <li>セキュリティおよび不正防止パートナー</li>
  </ul>
  すべての第三者は、厳格な機密保持およびデータ保護要件を遵守する必要があります。
  <br><br>

  <dt class="heading-4">7. 国際データ転送</dt>
  お客様の情報は以下の地域で処理される場合があります：
  <ul class="list-marked">
      <li>欧州連合</li>
      <li>米国</li>
      <li>当社のサービスプロバイダーが活動するその他の国</li>
  </ul>
  当社は、以下のような法的に認められた保護措置を使用します：
  <ul class="list-marked">
      <li>標準契約条項（SCC）</li>
      <li>十分性認定決定</li>
      <li>契約上の保護措置</li>
  </ul>
  <br><br>

  <dt class="heading-4">8. データの保持期間</dt>
  当社は、以下の目的に必要な期間のみお客様の情報を保持します：
  <ul class="list-marked">
      <li>サービスの提供</li>
      <li>法的義務の遵守</li>
      <li>紛争の解決</li>
      <li>契約の執行</li>
  </ul>
  アカウントの削除はいつでもリクエストすることができます。
  <br><br>

  <dt class="heading-4">9. セキュリティ対策</dt>
  当社は業界標準のセキュリティプラクティスを実施しています：
  <ul class="list-marked">
      <li>パスワードの暗号化</li>
      <li>SSL/TLS 暗号化</li>
      <li>ファイアウォールおよびマルウェアスキャン</li>
      <li>個人データへのアクセス制限</li>
      <li>定期的なセキュリティ監査</li>
      <li>安全な決済ゲートウェイ（カード情報は保存しません）</li>
  </ul>
  完全に安全なシステムは存在しませんが、当社はお客様の情報を保護するための合理的な措置を講じています。
  <br><br>

  <dt class="heading-4">10. お客様の権利</dt>
  <dt class="heading-5">EU/UK ユーザー（GDPR）</dt>
  お客様は以下の権利を有します：
  <ul class="list-marked">
      <li>データへのアクセス</li>
      <li>不正確なデータの訂正</li>
      <li>データの削除（「忘れられる権利」）</li>
      <li>処理の制限</li>
      <li>処理への異議申し立て</li>
      <li>データポータビリティ</li>
      <li>同意の撤回</li>
  </ul>
  <br><br>
  <dt class="heading-5">カリフォルニア州ユーザー（CCPA/CPRA）</dt>
  お客様は以下の権利を有します：
  <ul class="list-marked">
      <li>収集されるデータの内容を知る権利</li>
      <li>削除のリクエスト</li>
      <li>データ共有からのオプトアウト</li>
      <li>権利行使による差別の禁止</li>
  </ul>
  <br><br>
  <dt class="heading-5">カナダ（PIPEDA）</dt>
  お客様は以下の権利を有します：
  <ul class="list-marked">
      <li>データへのアクセス</li>
      <li>正確性への異議申し立て</li>
      <li>同意の撤回</li>
  </ul>
  <br><br>
  <dt class="heading-5">オーストラリア</dt>
  お客様は以下の権利を有します：
  <ul class="list-marked">
      <li>個人情報へのアクセスおよび訂正</li>
      <li>不正使用に関する苦情の申し立て</li>
  </ul>
  権利を行使するには、<a href="/ja/contact">お問い合わせ</a>ページよりご連絡ください。
  <br><br>

  <dt class="heading-4">11. 子どものプライバシー（COPPA）</dt>
  当社は、13歳未満の子どもから意図的に情報を収集しません。13歳未満の子どもがアカウントを作成していることが判明した場合、速やかに削除します。
  <br><br>

  <dt class="heading-4">12. トラッキング拒否（DNT）</dt>
  当社は、技術的に実現可能な範囲でトラッキング拒否（Do Not Track）シグナルを尊重します。
  <br><br>

  <dt class="heading-4">13. データ侵害の通知</dt>
  データ侵害が発生した場合、当社は影響を受けるユーザーに以下の方法で通知します：
  <ul class="list-marked">
      <li>メールまたはサイト上の通知</li>
      <li>合理的な期間内（通常7営業日以内）</li>
  </ul>
  <br><br>

  <dt class="heading-4">14. メール・通信の遵守（CAN-SPAM）</dt>
  当社は以下を遵守します：
  <ul class="list-marked">
      <li>誤解を招く件名や送信者情報を使用しない</li>
      <li>明確な購読解除オプションを提供する</li>
      <li>購読解除のリクエストに速やかに対応する</li>
  </ul>
  購読はいつでも解除することができます。
  <br><br>

  <dt class="heading-4">15. プライバシーポリシーの変更</dt>
  当社は定期的にこのプライバシーポリシーを更新することがあります。変更内容は、「最終更新日」を更新してこのページに掲載されます。
  <br><br>

  <dt class="heading-4">16. お問い合わせ</dt>
  このプライバシーポリシーに関するご質問は、ウェブサイトの<a href="/ja/contact">お問い合わせ</a>フォームよりご連絡ください。
  <br>
