faq.one_title_txt: "このサイトにアクセスするにはどうすればいいですか？"
faq.one_content_txt: |
  パトロンまたはドナーである必要があり、お問い合わせフォームまたは
  <a href="https://facebook.com/OktoDark">Facebook</a>ページへの本名でのダイレクトメッセージを送ってください。
  <br>サイトのアカウントはすべての接続情報と共にメールで送信されます。

faq.two_title_txt: "投票システムとはどういう意味ですか？"
faq.two_content_txt: >
  ティアIIから、誰でもキャラクターやゲームの世界などに投票できます。
  全員が開発に参加します。

faq.three_title_txt: "投票システムについてもう少し詳しく教えてください"
faq.three_content_txt: |
