# Japanese Terms and Conditions Translations
terms_and_conditions.subtitle: "利用規約をよくお読みください。"
terms_and_conditions.section: |
  <p class="text-light small mb-4">
    最終更新日: 2026年5月29日
  </p>

  <dt class="heading-4">1. はじめに</dt>
  OktoDark は OktoDark Studios が運営するデジタルプラットフォームです。アカウントの作成、ウェブサイトへのアクセス、コンテンツのダウンロード、またはプラットフォームの各種機能（フォーラム、マーケットプレイス、インストーラー、アップデーター、通知機能、その他関連サービス）を利用することで、あなたは本利用規約に同意したものとみなされます。もし同意できない場合は、プラットフォームの利用を中止してください。
  <br><br>

  <dt class="heading-4">2. 利用資格</dt>
  プラットフォームを利用するには、以下の条件を満たす必要があります:
  <ul class="list-marked">
      <li>13歳以上であること</li>
      <li>お住まいの地域でオンラインサービスを利用する法的許可があること</li>
      <li>本利用規約および <a href="/ja/privacy-policy">プライバシーポリシー</a> に同意すること</li>
  </ul>
  これらの条件に違反した場合、アカウントを停止または削除する場合があります。
  <br><br>

  <dt class="heading-4">3. プラットフォーム概要</dt>
  OktoDark では以下の機能を提供しています:
  <ul class="list-marked">
      <li>掲示板、スレッド、ディスカッションを備えたコミュニティフォーラム</li>
      <li>投稿の公開・閲覧ができるブログシステム</li>
      <li>ユーザーやコンテンツをフォローできるフォロー機能</li>
      <li>通知システム（メールおよびサイト内通知）</li>
      <li>ロールベースの権限システム</li>
      <li>ユーザープロフィール、アバター、署名、ソーシャルリンク</li>
      <li>デジタルアセット、MOD、ツール、ダウンロードのマーケットプレイス</li>
      <li>バージョン管理付きの安全なダウンロードシステム</li>
      <li>インストーラーおよびアップデーター</li>
      <li>AI を活用した補助機能（モデレーション、提案、要約など）</li>
  </ul>
  本利用規約は、現在および将来追加されるすべての機能に適用されます。
  <br><br>

  <dt class="heading-4">4. アカウント登録</dt>
  アカウントを作成する際、あなたは以下に同意します:
  <ul class="list-marked">
      <li>正確な情報を提供すること</li>
      <li>パスワードを安全に管理すること</li>
      <li>アカウントを共有しないこと</li>
      <li>他人になりすまさないこと</li>
      <li>悪用目的で複数アカウントを作成しないこと</li>
  </ul>
  アカウントで行われるすべての行為について、あなたが責任を負います。
  <br><br>

  <dt class="heading-4">5. ユーザーコンテンツ</dt>

  <dt class="heading-5">5.1 あなたのコンテンツ</dt>
  あなたが投稿またはアップロードしたコンテンツの所有権はあなたにあります。ただし、OktoDark に投稿することで、以下の目的で使用する非独占的・世界的・ロイヤリティフリーのライセンスを OktoDark に付与します:
  <ul class="list-marked">
      <li>表示</li>
      <li>保存</li>
      <li>配布</li>
      <li>修正（モデレーションやフォーマット調整のため）</li>
  </ul>
  このライセンスは、あなたがコンテンツまたはアカウントを削除した時点で終了します。
  <br><br>

  <dt class="heading-5">5.2 禁止されるコンテンツ</dt>
  以下のコンテンツを投稿またはアップロードすることは禁止されています:
  <ul class="list-marked">
      <li>違法コンテンツ</li>
      <li>ヘイトスピーチ、嫌がらせ、脅迫</li>
      <li>NSFW コンテンツ（指定エリアを除く）</li>
      <li>マルウェア、エクスプロイト、有害なスクリプト</li>
      <li>スパム、広告、許可のない自己宣伝</li>
      <li>権利を所有していない著作物</li>
      <li>第三者ライセンスに違反するアセット</li>
  </ul>
  必要に応じて、コンテンツの削除やアクセス制限を行う場合があります。
  <br><br>
  <dt class="heading-4">6. マーケットプレイスとダウンロード</dt>
  OktoDark マーケットプレイスでは、ユーザーが以下のことを行えます:
  <ul class="list-marked">
      <li>デジタルアセット（MOD、ツール、テーマ、リソースなど）のアップロード</li>
      <li>他のユーザーが共有したコンテンツのダウンロード</li>
      <li>バージョン管理されたファイルや変更履歴へのアクセス</li>
      <li>クリエイターをフォローして更新通知を受け取ること</li>
  </ul>

  <dt class="heading-5">6.1 アセットのアップロード</dt>
  マーケットプレイスにアセットをアップロードすることで、あなたは以下を保証します:
  <ul class="list-marked">
      <li>アップロードするコンテンツの権利を所有していること</li>
      <li>そのコンテンツを配布する許可を持っていること</li>
      <li>ライセンス（MIT、GPL、CC、独自ライセンスなど）を明確に記載すること</li>
      <li>有害または悪意のあるコードが含まれていないこと</li>
      <li>コンテンツが適用されるすべての法律に準拠していること</li>
  </ul>
  必要に応じて、アセットを削除または制限する場合があります。
  <br><br>

  <dt class="heading-5">6.2 アセットのダウンロード</dt>
  コンテンツをダウンロードする際、あなたは以下に同意します:
  <ul class="list-marked">
      <li>クリエイターが指定したライセンスに従うこと</li>
      <li>ダウンロードは「現状のまま」提供されることを理解すること</li>
      <li>インストールや使用に伴うリスクをすべて自己負担とすること</li>
  </ul>
  第三者コンテンツによって生じた損害について、当社は責任を負いません。
  <br><br>

  <dt class="heading-5">6.3 有料コンテンツ（有効化されている場合）</dt>
  マーケットプレイスに有料アイテムが含まれる場合:
  <ul class="list-marked">
      <li>支払いは第三者の決済サービスによって処理されます</li>
      <li>返金は決済サービスのポリシーに従います</li>
      <li>チャージバックが発生した場合、アカウント制限が行われる可能性があります</li>
  </ul>
  <br><br>

  <dt class="heading-5">6.4 アセットの削除</dt>
  クリエイターはいつでも自身のアセットを削除できます。ただし:
  <ul class="list-marked">
      <li>過去にダウンロードしたユーザーは、以前のバージョンに引き続きアクセスできる場合があります</li>
      <li>セキュリティや監査目的でバックアップを保持する場合があります</li>
  </ul>
  <br><br>

  <dt class="heading-4">7. フォーラムおよびコミュニティルール</dt>
  フォーラムを利用することで、あなたは以下に同意します:
  <ul class="list-marked">
      <li>他のメンバーを尊重すること</li>
      <li>各ボードのトピックに沿った投稿を行うこと</li>
      <li>モデレーターの指示に従うこと</li>
      <li>迷惑行為を避けること</li>
      <li>フォロー機能や通知機能を悪用しないこと</li>
  </ul>
  モデレーターは投稿の編集・移動・削除、警告やアカウント制限を行う場合があります。
  <br><br>

  <dt class="heading-4">8. ロールと権限</dt>
  プラットフォームではロールベースの権限システムを採用しています:
  <ul class="list-marked">
      <li>ロールによって実行できる操作が決まります</li>
      <li>管理者はロールの付与・変更・取り消しを行うことができます</li>
  </ul>
  権限の不正回避は固く禁止されています。不正アクセスの試みはアカウント停止の対象となります。
  <br><br>

  <dt class="heading-4">9. 通知</dt>
  あなたは以下の通知を受け取る場合があります:
  <ul class="list-marked">
      <li>メール通知</li>
      <li>サイト内通知</li>
      <li>セキュリティ警告</li>
      <li>システムメッセージ</li>
      <li>フォロー更新通知</li>
      <li>マーケットプレイスの更新通知</li>
  </ul>
  通知設定で受信内容を管理できます。
  <br><br>

  <dt class="heading-4">10. AI 補助機能</dt>
  一部の機能では AI を使用する場合があります:
  <ul class="list-marked">
      <li>コンテンツの提案</li>
      <li>要約生成</li>
      <li>モデレーション補助</li>
      <li>自動アラート</li>
      <li>マーケットプレイスアセットの分析</li>
  </ul>
  AI の出力は常に正確とは限りません。法律・医療・金融などの重要な判断を AI に依存しないことに同意するものとします。
  <br><br>
  <dt class="heading-4">11. インストーラーとアップデーター</dt>
  OktoDark のインストーラーまたはアップデーターを使用する場合、あなたは以下に同意します:
  <ul class="list-marked">
      <li>サーバー環境の管理はあなた自身の責任であること</li>
      <li>インストールやアップデート中に発生したデータ損失について当社は責任を負わないこと</li>
      <li>更新を行う前にバックアップを作成する義務があること</li>
      <li>システムファイルを改変するとサポート対象外となる場合があること</li>
      <li>自動アップデート機能は信頼されたソースからファイルをダウンロードする場合があること</li>
  </ul>
  <br><br>

  <dt class="heading-4">12. セキュリティ</dt>
  当社はあなたのデータを保護するために合理的な措置を講じていますが、以下を理解してください:
  <ul class="list-marked">
      <li>完全に安全なシステムは存在しないこと</li>
      <li>デバイスやパスワードの管理はあなた自身の責任であること</li>
      <li>不審な活動を発見した場合は直ちに報告する必要があること</li>
  </ul>
  プラットフォームのハッキング、悪用、妨害を試みる行為は禁止されています。
  <br><br>

  <dt class="heading-4">13. サードパーティサービス</dt>
  プラットフォームは以下のような第三者サービスと連携する場合があります:
  <ul class="list-marked">
      <li>ソーシャルログイン</li>
      <li>アクセス解析サービス</li>
      <li>メール配信サービス</li>
      <li>決済サービス</li>
      <li>AI プロバイダー</li>
  </ul>
  これら第三者サービスのポリシーや行動について、当社は責任を負いません。
  <br><br>

  <dt class="heading-4">14. アカウントの停止・終了</dt>
  以下に該当する場合、当社はあなたのアカウントを停止または終了することがあります:
  <ul class="list-marked">
      <li>本利用規約に違反した場合</li>
      <li>プラットフォームを悪用した場合</li>
      <li>システムやコミュニティに害を及ぼそうとした場合</li>
      <li>有害または違法なコンテンツをアップロードした場合</li>
      <li>マーケットプレイスで不正行為を行った場合</li>
  </ul>
  あなたはいつでもアカウントを削除できます。
  <br><br>

  <dt class="heading-4">15. 免責事項</dt>
  法律で認められる最大限の範囲において、当社は以下について責任を負いません:
  <ul class="list-marked">
      <li>データ損失</li>
      <li>サービスの停止や中断</li>
      <li>ユーザー生成コンテンツによる問題</li>
      <li>ダウンロードやマーケットプレイスのアセットによる損害</li>
      <li>第三者サービスによって発生した問題</li>
  </ul>
  プラットフォームの利用は自己責任で行ってください。
  <br><br>
  <dt class="heading-4">16. 利用規約の変更</dt>
  当社は必要に応じて本利用規約を更新する場合があります。変更が重要であると判断される場合、以下の方法でユーザーに通知します:
  <ul class="list-marked">
      <li>メール通知</li>
      <li>サイト内通知</li>
      <li>システムアナウンス</li>
  </ul>
  プラットフォームの継続利用により、更新後の利用規約に同意したものとみなされます。
  <br><br>

  <dt class="heading-4">17. お問い合わせ</dt>
  ご質問やご不明点がある場合は、<a href="/ja/contact">お問い合わせページ</a>からご連絡ください。
  <br><br>

  <dt class="heading-4">18. マーケットプレイス規約（OktoDark Marketplace）</dt>

  <dt class="heading-5">1. はじめに</dt>
  OktoDark マーケットプレイスでは、ユーザーが MOD、ツール、テーマ、リソースなどのデジタルアセットをアップロード、共有、ダウンロードできます。マーケットプレイスを利用することで、あなたは本規約および利用規約全体に同意したものとみなされます。
  <br><br>

  <dt class="heading-5">2. アップロード資格</dt>
  コンテンツをアップロードするには、以下の条件を満たす必要があります:
  <ul class="list-marked">
      <li>コンテンツの権利を所有していること</li>
      <li>配布の許可を持っていること</li>
      <li>ライセンス（MIT、GPL、CC、独自ライセンスなど）を明確に記載すること</li>
      <li>第三者の権利を侵害していないこと</li>
      <li>有害または悪意のあるコードが含まれていないこと</li>
  </ul>
  必要に応じて、所有権やライセンスの証明を求める場合があります。
  <br><br>

  <dt class="heading-5">3. 禁止されるマーケットプレイスコンテンツ</dt>
  以下のコンテンツをアップロードすることは禁止されています:
  <ul class="list-marked">
      <li>海賊版または盗用コンテンツ</li>
      <li>商用ゲームやソフトウェアから無断で抽出したアセット</li>
      <li>マルウェア、ウイルス、有害スクリプト</li>
      <li>第三者の権利を侵害する AI 生成コンテンツ</li>
      <li>指定カテゴリ以外での NSFW コンテンツ</li>
      <li>地域または国際法に違反するコンテンツ</li>
  </ul>
  <br><br>

  <dt class="heading-5">4. バージョン管理と更新</dt>
  クリエイターはアセットの新しいバージョンをアップロードできます。法的理由により削除されない限り、以前のバージョンは過去にダウンロードしたユーザーが引き続きアクセスできる場合があります。
  <br><br>

  <dt class="heading-5">5. アセットの削除</dt>
  以下に該当する場合、当社はアセットを削除することがあります:
  <ul class="list-marked">
      <li>本規約に違反している場合</li>
      <li>DMCA 申立てを受けた場合</li>
      <li>有害コードが含まれている場合</li>
      <li>放置されている、または動作しない場合</li>
      <li>ライセンス違反が確認された場合</li>
  </ul>
  クリエイター自身もいつでもアセットを削除できます。
  <br><br>

  <dt class="heading-5">6. ユーザーの責任</dt>
  アセットをダウンロードするユーザーは以下に従う必要があります:
  <ul class="list-marked">
      <li>クリエイターが指定したライセンスを遵守すること</li>
      <li>帰属表示が必要な場合はそれを守ること</li>
      <li>許可なく再配布しないこと</li>
      <li>ライセンスで禁止されている方法で改変しないこと</li>
  </ul>
  <br><br>

  <dt class="heading-5">7. マーケットプレイスのモデレーション</dt>
  当社は以下の権利を有します:
  <ul class="list-marked">
      <li>アセットの削除</li>
      <li>アップロードの制限</li>
      <li>アカウントの一時停止</li>
      <li>重大または繰り返しの違反者の永久禁止</li>
  </ul>
  モデレーションの判断は最終的なものとします。
  <br><br>

  <dt class="heading-4">19. ダウンロードライセンスポリシー</dt>

  <dt class="heading-5">1. 概要</dt>
  OktoDark 上のすべてのダウンロードは、クリエイターが選択したライセンスに従います。明示的に記載されていない限り、OktoDark はユーザーがアップロードしたコンテンツの所有権を主張しません。
  <br><br>

  <dt class="heading-5">2. ライセンスタイプ</dt>
  クリエイターは以下のライセンスから選択できます:
  <ul class="list-marked">
      <li>MIT ライセンス</li>
      <li>GPL / LGPL</li>
      <li>Creative Commons（CC‑BY、CC‑BY‑SA、CC‑BY‑NC など）</li>
      <li>独自ライセンス</li>
      <li>All rights reserved（全権利留保）</li>
  </ul>
  ライセンスはアセットページに明確に記載する必要があります。
  <br><br>

  <dt class="heading-5">3. ユーザーの権利</dt>
  コンテンツをダウンロードしたユーザーは以下を行うことができます:
  <ul class="list-marked">
      <li>ライセンスに従ってアセットを使用すること</li>
      <li>ライセンスが許可する場合は改変すること</li>
      <li>許可されている場合のみ再配布すること</li>
  </ul>
  以下は禁止されています:
  <ul class="list-marked">
      <li>著作権表示の削除</li>
      <li>他者の作品を自分のものと主張すること</li>
      <li>許可なく商用利用すること</li>
      <li>ライセンス制限を回避する行為</li>
  </ul>
  <br><br>

  <dt class="heading-5">4. クリエイターの権利</dt>
  クリエイターは以下の権利を保持します:
  <ul class="list-marked">
      <li>著作権</li>
      <li>帰属表示の権利</li>
      <li>コンテンツの更新・削除の権利</li>
      <li>ライセンスの執行権</li>
  </ul>
  <br><br>

  <dt class="heading-5">5. OktoDark の役割</dt>
  OktoDark は以下を行います:
  <ul class="list-marked">
      <li>ユーザーコンテンツの所有権を主張しない</li>
      <li>ダウンロードの安全性や合法性を保証しない</li>
      <li>ユーザーによるライセンス違反に責任を負わない</li>
      <li>有効な DMCA 要求に従う</li>
  </ul>
  <br><br>

  <dt class="heading-4">20. DMCA / 著作権ポリシー</dt>

  <dt class="heading-5">1. はじめに</dt>
  OktoDark は知的財産権を尊重し、DMCA（デジタルミレニアム著作権法）および同等の国際法に準拠します。
  <br><br>

  <dt class="heading-5">2. DMCA 削除要請の提出</dt>
  著作物が無断でアップロードされたと考える場合、以下を含む削除要請を提出できます:
  <ul class="list-marked">
      <li>氏名</li>
      <li>連絡先情報</li>
      <li>著作物の説明</li>
      <li>侵害コンテンツの URL</li>
      <li>善意の申し立て声明</li>
      <li>偽証罪に関する宣誓</li>
      <li>署名（電子署名可）</li>
  </ul>
  要請は <a href="/ja/contact">お問い合わせページ</a> から送信できます。
  <br><br>
  <dt class="heading-5">3. 反論通知（カウンターノーティス）</dt>
  あなたのコンテンツが誤って削除されたと考える場合、以下を含む反論通知を提出できます:
  <ul class="list-marked">
      <li>氏名</li>
      <li>連絡先情報</li>
      <li>削除されたコンテンツの URL</li>
      <li>善意の申し立て声明</li>
      <li>法的管轄に同意する旨の声明</li>
      <li>署名（電子署名可）</li>
