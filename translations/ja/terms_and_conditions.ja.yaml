  <dt class="heading-5">5. クリエイター収益</dt>
  クリエイターへの支払いは、マーケットプレイスの収益分配モデルに基づいて行われます。返金が発生した場合、将来の支払いから差し引かれることがあります。
  <br><br>

  <dt class="heading-4">22. マーケットプレイス販売者契約 — OktoDark Studios</dt>
  本「販売者契約」（以下「本契約」）は、OktoDark マーケットプレイスにおける販売者としてのあなたの活動を規定するものです。デジタルコンテンツをアップロード、掲載、販売することで、あなたは本契約および利用規約、マーケットプレイス規約、ダウンロードライセンスポリシー、返金ポリシー、プライバシーポリシーに同意したものとみなされます。
  <br><br>

  <dt class="heading-5">1. 定義</dt>
  <strong>販売者（Seller）:</strong> マーケットプレイスにデジタルコンテンツをアップロードまたは配布するユーザー。<br>
  <strong>購入者（Buyer）:</strong> コンテンツをダウンロードまたは購入するユーザー。<br>
  <strong>コンテンツ（Content）:</strong> 販売者がアップロードする MOD、ツール、テーマ、スクリプト、リソース、ドキュメントなどのデジタルアセット。<br>
  <strong>プラットフォーム（Platform）:</strong> OktoDark のウェブサイト、マーケットプレイス、および関連サービス。<br>
  <strong>OktoDark Studios:</strong> プラットフォームの運営者および所有者。<br><br>

  <dt class="heading-5">2. 販売資格</dt>
  <strong>アクティブなアカウント:</strong> 良好な状態の OktoDark アカウントを保持していること。<br>
  <strong>法的能力:</strong> 契約を締結し、支払いを受け取る法的能力を有していること。<br>
  <strong>法令遵守:</strong> 著作権、税務、輸出規制など、適用されるすべての法律を遵守すること。<br>
  OktoDark Studios は、販売者資格を承認・制限・取り消す権利を有します。
  <br><br>

  <dt class="heading-5">3. 所有権と権利</dt>
  <strong>あなたの所有権:</strong> アップロードしたコンテンツの所有権はあなたにあります。<br>
  <strong>OktoDark に付与する権利:</strong> コンテンツをアップロードすることで、以下の非独占的・世界的・ロイヤリティフリーのライセンスを OktoDark に付与します:
  <ul class="list-marked">
      <li>コンテンツのホスティング、保存、表示</li>
      <li>購入者への配布</li>
      <li>マーケットプレイスおよびプラットフォームの宣伝目的での利用</li>
  </ul>
  <strong>第三者の権利:</strong> あなたのコンテンツが以下を満たすことを保証します:
  <ul class="list-marked">
      <li>第三者の著作権、商標権、その他の権利を侵害していないこと</li>
      <li>使用しているツールやライブラリのライセンスに準拠していること</li>
  </ul>
  コンテンツに起因する法的問題について、あなたが全責任を負います。
  <br><br>

  <dt class="heading-5">4. コンテンツ要件</dt>
  以下のコンテンツをアップロードしてはなりません:
  <ul class="list-marked">
      <li>海賊版または盗用コンテンツ</li>
      <li>商用ゲームやソフトウェアから無断抽出したアセット</li>
      <li>マルウェア、バックドア、有害コード</li>
      <li>誤解を招く、詐欺的、または虚偽の内容</li>
