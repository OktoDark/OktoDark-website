  <dt class="heading-4">21. 返金ポリシー（有料マーケットプレイスアイテム）</dt>
  このポリシーは、有料アセットが有効化されている場合に適用されます。
  <br><br>

  <dt class="heading-5">1. 概要</dt>
  OktoDark マーケットプレイスの有料アイテムは、第三者の決済サービスによって処理されます。返金は OktoDark のルールと決済サービスのポリシーの両方に従います。
  <br><br>

  <dt class="heading-5">2. 返金対象</dt>
  以下の場合、返金が認められることがあります:
  <ul class="list-marked">
      <li>アセットが壊れている、または機能しない場合</li>
      <li>説明が誤解を招く、または虚偽であった場合</li>
      <li>アセットに悪意のあるコードが含まれていた場合</li>
      <li>クリエイターが約束した更新を提供しなかった場合（明示されている場合）</li>
  </ul>
  以下の場合、返金は行われません:
  <ul class="list-marked">
      <li>購入者の気まぐれ（気が変わったなど）</li>
      <li>あなたの環境との非互換性</li>
      <li>ユーザーによる改変が原因の問題</li>
      <li>すでに広範囲に使用されたコンテンツ</li>
  </ul>
  <br><br>

  <dt class="heading-5">3. 返金手続き</dt>
  返金を希望する場合:
  <ul class="list-marked">
      <li><a href="/ja/contact">お問い合わせページ</a> からサポートに連絡する</li>
      <li>注文 ID を提供する</li>
      <li>問題の詳細を説明する</li>
      <li>必要に応じてスクリーンショットやログを提出する</li>
  </ul>
  当社は確認のためクリエイターに連絡する場合があります。
  <br><br>

  <dt class="heading-5">4. チャージバック</dt>
  不正なチャージバックが行われた場合、以下の措置が取られることがあります:
  <ul class="list-marked">
      <li>アカウント制限</li>
      <li>購入済みアイテムへのアクセス停止</li>
      <li>マーケットプレイス機能の利用停止</li>
  </ul>
