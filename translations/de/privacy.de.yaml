privacy.title: "Datenschutzrichtlinie"
privacy.subtitle: "Erfahren Sie, wie wir Ihre persönlichen Daten sammeln, verwenden, speichern und schützen."
privacy.section: |
  <p class="text-light small mb-4">
    Zuletzt aktualisiert: 29.05.2029
  </p>

  Diese Datenschutzrichtlinie erläutert, wie OktoDark Studios („wir“, „uns“, „unser“) Ihre persönlichen Daten sammelt, verwendet, speichert und schützt, wenn Sie unsere Website, unser Forum, unseren Marktplatz, unseren Blog oder damit verbundene Dienste („Plattform“) nutzen. Wir halten uns an wichtige globale Datenschutzbestimmungen, einschließlich:
  <ul class="list-marked">
      <li>EU-Datenschutz-Grundverordnung (DSGVO)</li>
      <li>UK DSGVO</li>
      <li>California Consumer Privacy Act (CCPA/CPRA)</li>
      <li>California Online Privacy Protection Act (CalOPPA)</li>
      <li>Children’s Online Privacy Protection Act (COPPA)</li>
      <li>US Federal & State privacy principles</li>
      <li>Kanada PIPEDA</li>
      <li>Australien Privacy Act</li>
      <li>Internationale Anforderungen an den Datentransfer</li>
  </ul>
  Durch die Nutzung unserer Plattform stimmen Sie den in dieser Datenschutzrichtlinie beschriebenen Praktiken zu.
  <br><br>

  <dt class="heading-4">1. Von uns gesammelte Informationen</dt>
  Wir können die folgenden Kategorien von Informationen sammeln:
  <br><br>
  <dt class="heading-5">1.1 Informationen, die Sie direkt bereitstellen</dt>
  <ul class="list-marked">
      <li>Name oder Benutzername</li>
      <li>E-Mail-Adresse</li>
      <li>Passwort (verschlüsselt)</li>
      <li>Profildetails (Avatar, Bio, soziale Links)</li>
      <li>Forumbeiträge, Kommentare, Nachrichten</li>
      <li>Marktplatz-Uploads und Metadaten</li>
      <li>Support-Anfragen oder Formularübermittlungen</li>
  </ul>
  <br><br>
  <dt class="heading-5">1.2 Automatisch gesammelte Informationen</dt>
  <ul class="list-marked">
      <li>IP-Adresse</li>
      <li>Browsertyp und -version</li>
      <li>Geräteinformationen</li>
      <li>Betriebssystem</li>
      <li>Verweisende URLs</li>
      <li>Besuchte Seiten und durchgeführte Aktionen</li>
      <li>Cookies und Tracking-IDs</li>
  </ul>
  <br><br>
  <dt class="heading-5">1.3 Optionale Informationen</dt>
  <ul class="list-marked">
      <li>Newsletter-Abonnements</li>
      <li>Benachrichtigungseinstellungen</li>
      <li>Informationen zum Marktplatzverkäufer</li>
      <li>Zahlungsinformationen (von Drittanbietern verarbeitet; wir speichern keine Kartendaten)</li>
  </ul>
  <br><br>

  <dt class="heading-4">2. Wie wir Ihre Informationen verwenden</dt>
  Wir verwenden Ihre Informationen, um:
  <ul class="list-marked">
      <li>Ihr Konto zu erstellen und zu verwalten</li>
      <li>Zugriff auf das Forum, den Marktplatz und die Plattformfunktionen zu ermöglichen</li>
      <li>Ihre Erfahrung zu personalisieren</li>
      <li>Unsere Website und Dienste zu verbessern</li>
      <li>Support-Anfragen zu beantworten</li>
      <li>Benachrichtigungen und Updates zu senden (sofern aktiviert)</li>
      <li>Betrug, Missbrauch und Sicherheitsbedrohungen zu verhindern</li>
      <li>Gesetzlichen Verpflichtungen nachzukommen</li>
  </ul>
  Wir verkaufen Ihre persönlichen Daten nicht.
  <br><br>

  <dt class="heading-4">3. Rechtsgrundlagen der Verarbeitung (DSGVO/UK DSGVO)</dt>
  Für Nutzer in der EU/UK verarbeiten wir Daten auf folgenden Rechtsgrundlagen:
  <ul class="list-marked">
      <li><strong>Vertrag</strong> — um Ihnen Zugang zur Plattform zu ermöglichen</li>
      <li><strong>Einwilligung</strong> — für Newsletter, Cookies, Analysen</li>
      <li><strong>Berechtigtes Interesse</strong> — um die Plattform zu sichern und zu verbessern</li>
      <li><strong>Gesetzliche Verpflichtung</strong> — um geltende Gesetze einzuhalten</li>
  </ul>
  Sie können Ihre Einwilligung jederzeit widerrufen.
  <br><br>

  <dt class="heading-4">4. Cookies & Tracking-Technologien</dt>
  Wir verwenden Cookies, um:
  <ul class="list-marked">
      <li>Ihre Präferenzen zu speichern</li>
      <li>Login-Sitzungen aufrechtzuerhalten</li>
      <li>Website-Traffic zu analysieren</li>
      <li>Das Benutzererlebnis zu verbessern</li>
      <li>Marktplatz- und Forum-Funktionalität zu ermöglichen</li>
  </ul>
  Sie können Cookies in Ihren Browsereinstellungen deaktivieren. Essentielle Cookies können für die Funktion der Plattform erforderlich sein.
  <br><br>

  <dt class="heading-4">5. Dienste Dritter</dt>
  Wir können vertrauenswürdige Drittanbieter nutzen für:
  <ul class="list-marked">
      <li>Analysen (z.B. Google Analytics)</li>
      <li>Werbung (z.B. Google AdSense)</li>
      <li>Zahlungsabwicklung</li>
      <li>E-Mail-Zustellung</li>
      <li>Sicherheits- und Anti-Missbrauchssysteme</li>
  </ul>
  Diese Anbieter können Cookies oder Tracking-Technologien verwenden. Wir erlauben kein Drittanbieter-Verhaltens-Tracking über das hinaus, was für Analysen oder Anzeigen notwendig ist.
  <br><br>

  <dt class="heading-4">6. Datenweitergabe</dt>
  Wir verkaufen oder handeln Ihre persönlichen Daten nicht. Wir können Daten nur weitergeben an:
  <ul class="list-marked">
      <li>Dienstleister, die in unserem Auftrag handeln</li>
      <li>Rechtliche Behörden, wenn dies erforderlich ist</li>
      <li>Marktplatzverkäufer (begrenzt auf kaufbezogene Informationen)</li>
      <li>Sicherheits- und Betrugsverhütungspartner</li>
  </ul>
  Alle Drittparteien müssen strenge Vertraulichkeits- und Datenschutzanforderungen erfüllen.
  <br><br>

  <dt class="heading-4">7. Internationale Datenübertragungen</dt>
  Ihre Informationen können verarbeitet werden in:
  <ul class="list-marked">
      <li>Der Europäischen Union</li>
      <li>Den Vereinigten Staaten</li>
      <li>Anderen Ländern, in denen unsere Dienstleister tätig sind</li>
  </ul>
  Wir verwenden rechtlich anerkannte Schutzmaßnahmen wie:
  <ul class="list-marked">
      <li>Standardvertragsklauseln (SCCs)</li>
      <li>Angemessenheitsbeschlüsse</li>
      <li>Vertragliche Schutzmaßnahmen</li>
  </ul>
  <br><br>

  <dt class="heading-4">8. Datenaufbewahrung</dt>
  Wir bewahren Ihre Informationen nur so lange auf, wie es notwendig ist, um:
  <ul class="list-marked">
      <li>Dienste bereitzustellen</li>
      <li>Gesetzlichen Verpflichtungen nachzukommen</li>
      <li>Streitigkeiten zu lösen</li>
      <li>Vereinbarungen durchzusetzen</li>
  </ul>
  Sie können die Löschung Ihres Kontos jederzeit beantragen.
  <br><br>

  <dt class="heading-4">9. Sicherheitsmaßnahmen</dt>
  Wir implementieren branchenübliche Sicherheitspraktiken:
  <ul class="list-marked">
      <li>Verschlüsselte Passwörter</li>
      <li>SSL/TLS-Verschlüsselung</li>
      <li>Firewall- und Malware-Scans</li>
      <li>Begrenzter Zugriff auf persönliche Daten</li>
      <li>Regelmäßige Sicherheitsaudits</li>
      <li>Sichere Zahlungsgateways (wir speichern keine Kartendaten)</li>
  </ul>
  Kein System ist 100% sicher, aber wir ergreifen angemessene Schritte, um Ihre Informationen zu schützen.
  <br><br>

  <dt class="heading-4">10. Ihre Rechte</dt>
  <dt class="heading-5">EU/UK-Nutzer (DSGVO)</dt>
  Sie haben das Recht auf:
  <ul class="list-marked">
      <li>Zugriff auf Ihre Daten</li>
      <li>Berichtigung ungenauer Daten</li>
      <li>Löschung Ihrer Daten („Recht auf Vergessenwerden“)</li>
      <li>Einschränkung der Verarbeitung</li>
      <li>Widerspruch gegen die Verarbeitung</li>
      <li>Datenübertragbarkeit</li>
      <li>Widerruf der Einwilligung</li>
  </ul>
  <br><br>
  <dt class="heading-5">Kalifornische Nutzer (CCPA/CPRA)</dt>
  Sie haben das Recht auf:
  <ul class="list-marked">
      <li>Wissen, welche Daten gesammelt werden</li>
      <li>Löschung beantragen</li>
      <li>Abmeldung von der Datenweitergabe</li>
      <li>Nicht-Diskriminierung bei der Ausübung von Rechten</li>
  </ul>
  <br><br>
  <dt class="heading-5">Kanada (PIPEDA)</dt>
  Sie haben das Recht auf:
  <ul class="list-marked">
      <li>Zugriff auf Ihre Daten</li>
      <li>Genauigkeit anzufechten</li>
      <li>Einwilligung zu widerrufen</li>
  </ul>
  <br><br>
  <dt class="heading-5">Australien</dt>
  Sie haben das Recht auf:
  <ul class="list-marked">
      <li>Zugriff auf und Korrektur persönlicher Informationen</li>
      <li>Beschwerden über Missbrauch einzureichen</li>
  </ul>
  Um Ihre Rechte auszuüben, kontaktieren Sie uns über die Seite <a href="/en/contact">Kontakt</a>.
  <br><br>

  <dt class="heading-4">11. Datenschutz von Kindern (COPPA)</dt>
  Wir sammeln wissentlich keine Informationen von Kindern unter 13 Jahren. Wenn wir erfahren, dass ein Kind unter 13 Jahren ein Konto erstellt hat, werden wir es umgehend löschen.
  <br><br>

  <dt class="heading-4">12. Do Not Track (DNT)</dt>
  Wir respektieren Do Not Track-Signale, wo technisch machbar.
  <br><br>

  <dt class="heading-4">13. Benachrichtigung bei Datenpannen</dt>
  Im Falle einer Datenpanne werden wir betroffene Nutzer benachrichtigen:
  <ul class="list-marked">
      <li>Per E-Mail oder In-App-Benachrichtigung</li>
      <li>Innerhalb eines angemessenen Zeitrahmens (in der Regel innerhalb von 7 Werktagen)</li>
  </ul>
  <br><br>

  <dt class="heading-4">14. E-Mail- & Kommunikationskonformität (CAN-SPAM)</dt>
  Wir stimmen zu:
  <ul class="list-marked">
      <li>Keine irreführenden Betreffzeilen oder Absenderinformationen zu verwenden</li>
      <li>Eine klare Abmeldeoption bereitzustellen</li>
      <li>Abmeldewünschen umgehend nachzukommen</li>
  </ul>
  Sie können sich jederzeit abmelden.
  <br><br>

  <dt class="heading-4">15. Änderungen dieser Datenschutzrichtlinie</dt>
  Wir können diese Datenschutzrichtlinie regelmäßig aktualisieren. Änderungen werden auf dieser Seite mit einem aktualisierten „Zuletzt aktualisiert“-Datum veröffentlicht.
  <br><br>

  <dt class="heading-4">16. Kontaktieren Sie uns</dt>
  Wenn Sie Fragen zu dieser Datenschutzrichtlinie haben, können Sie uns über das <a href="/en/contact">Kontakt</a>formular auf der Website kontaktieren.
  <br>