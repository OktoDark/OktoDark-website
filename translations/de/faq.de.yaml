faq.one_title_txt: "Was kann ich tun, um Zugang zu dieser Website zu bekommen?"
faq.one_content_txt: |
  Sie müssen Patron oder Spender sein und uns eine Nachricht über das Kontaktformular
  oder eine private Nachricht auf unserer <a href="https://facebook.com/OktoDark">Facebook</a>-Seite
  mit Ihrem echten Namen senden.
  <br>Das Konto für unsere Website wird an Ihre E-Mail-Adresse mit allen Verbindungsdetails gesendet.

faq.two_title_txt: "Was bedeutet das Abstimmungssystem?"
faq.two_content_txt: >
  Ab Tier II kann jeder über Charaktere, die Spielwelt usw. abstimmen.
  Jeder ist an der Entwicklung beteiligt.

faq.three_title_txt: "Erklären Sie mehr über das Abstimmungssystem, bitte"
faq.three_content_txt: |
  Sie müssen ein Patron oder Spender sein, um das Abstimmungssystem zu sehen. Es ist geheim.
  <i class="fas fa-user-ninja"></i>