about.description: |
  Wir sind ein kleines, internationales Team, das Spiele und Apps entwickelt.
  <br>Wir sind eine neue Games Studio gegründet 2015, aber der gesamte OktoDark-Projekt wurde 2013 erstellt.
  <br>Wir sind keine der größten Game-Entwickler. Wir suchen nach neuer Talente, um unsere Team zu erweitern und sie in eine weltklasse Spieleentwicklung-Firma zu verwandeln.
