privacy.subtitle: "Learn how we collect, use, store, and protect your personal information."
privacy.section: |
  <p class="text-light small mb-4">
    Last updated: 29.05.2029
  </p>

  This Privacy Policy explains how OktoDark Studios (“we”, “us”, “our”) collects, uses, stores, and protects your personal information when you use our website, forum, marketplace, blog, or any related services (“Platform”). We comply with major global privacy regulations, including:
  <ul class="list-marked">
      <li>EU General Data Protection Regulation (GDPR)</li>
      <li>UK GDPR</li>
      <li>California Consumer Privacy Act (CCPA/CPRA)</li>
      <li>California Online Privacy Protection Act (CalOPPA)</li>
      <li>Children’s Online Privacy Protection Act (COPPA)</li>
      <li>US Federal & State privacy principles</li>
      <li>Canada PIPEDA</li>
      <li>Australia Privacy Act</li>
      <li>International data transfer requirements</li>
  </ul>
  By using our Platform, you agree to the practices described in this Privacy Policy.
  <br><br>

  <dt class="heading-4">1. Information We Collect</dt>
  We may collect the following categories of information:
  <br><br>
  <dt class="heading-5">1.1 Information you provide directly</dt>
  <ul class="list-marked">
      <li>Name or username</li>
      <li>Email address</li>
      <li>Password (encrypted)</li>
      <li>Profile details (avatar, bio, social links)</li>
      <li>Forum posts, comments, messages</li>
      <li>Marketplace uploads and metadata</li>
      <li>Support requests or form submissions</li>
  </ul>
  <br><br>
  <dt class="heading-5">1.2 Information collected automatically</dt>
  <ul class="list-marked">
      <li>IP address</li>
      <li>Browser type and version</li>
      <li>Device information</li>
      <li>Operating system</li>
      <li>Referring URLs</li>
      <li>Pages visited and actions taken</li>
      <li>Cookies and tracking identifiers</li>
  </ul>
  <br><br>
  <dt class="heading-5">1.3 Optional information</dt>
  <ul class="list-marked">
      <li>Newsletter subscriptions</li>
      <li>Notification preferences</li>
      <li>Marketplace seller information</li>
      <li>Payment information (processed by third‑party providers; we do not store card data)</li>
  </ul>
  <br><br>

  <dt class="heading-4">2. How We Use Your Information</dt>
  We use your information to:
  <ul class="list-marked">
      <li>Create and manage your account</li>
      <li>Provide access to the forum, marketplace, and platform features</li>
      <li>Personalize your experience</li>
      <li>Improve our website and services</li>
      <li>Respond to support requests</li>
      <li>Send notifications and updates (if enabled)</li>
      <li>Prevent fraud, abuse, and security threats</li>
      <li>Comply with legal obligations</li>
  </ul>
  We do not sell your personal information.
  <br><br>

  <dt class="heading-4">3. Legal Bases for Processing (GDPR/UK GDPR)</dt>
  For users in the EU/UK, we process data under these legal bases:
  <ul class="list-marked">
      <li><strong>Contract</strong> — to provide you access to the platform</li>
      <li><strong>Consent</strong> — for newsletters, cookies, analytics</li>
      <li><strong>Legitimate interest</strong> — to secure and improve the platform</li>
      <li><strong>Legal obligation</strong> — to comply with applicable laws</li>
  </ul>
  You may withdraw consent at any time.
  <br><br>

  <dt class="heading-4">4. Cookies & Tracking Technologies</dt>
  We use cookies to:
  <ul class="list-marked">
      <li>Remember your preferences</li>
      <li>Maintain login sessions</li>
      <li>Analyze site traffic</li>
      <li>Improve user experience</li>
      <li>Enable marketplace and forum functionality</li>
  </ul>
  You can disable cookies in your browser settings. Essential cookies may be required for the platform to function.
  <br><br>

  <dt class="heading-4">5. Third‑Party Services</dt>
  We may use trusted third‑party providers for:
  <ul class="list-marked">
      <li>Analytics (e.g., Google Analytics)</li>
      <li>Advertising (e.g., Google AdSense)</li>
      <li>Payment processing</li>
      <li>Email delivery</li>
      <li>Security and anti‑abuse systems</li>
  </ul>
  These providers may use cookies or tracking technologies. We do not allow third‑party behavioral tracking beyond what is necessary for analytics or ads.
  <br><br>

  <dt class="heading-4">6. Data Sharing</dt>
  We do not sell or trade your personal information. We may share data only with:
  <ul class="list-marked">
      <li>Service providers acting on our behalf</li>
      <li>Legal authorities when required</li>
      <li>Marketplace sellers (limited to purchase‑related information)</li>
      <li>Security and fraud‑prevention partners</li>
  </ul>
  All third parties must comply with strict confidentiality and data protection requirements.
  <br><br>

  <dt class="heading-4">7. International Data Transfers</dt>
  Your information may be processed in:
  <ul class="list-marked">
      <li>The European Union</li>
      <li>The United States</li>
      <li>Other countries where our service providers operate</li>
  </ul>
  We use legally recognized safeguards such as:
  <ul class="list-marked">
      <li>Standard Contractual Clauses (SCCs)</li>
      <li>Adequacy decisions</li>
      <li>Contractual protections</li>
  </ul>
  <br><br>

  <dt class="heading-4">8. Data Retention</dt>
  We retain your information only as long as necessary to:
  <ul class="list-marked">
      <li>Provide services</li>
      <li>Comply with legal obligations</li>
      <li>Resolve disputes</li>
      <li>Enforce agreements</li>
  </ul>
  You may request deletion of your account at any time.
  <br><br>

  <dt class="heading-4">9. Security Measures</dt>
  We implement industry‑standard security practices:
  <ul class="list-marked">
      <li>Encrypted passwords</li>
      <li>SSL/TLS encryption</li>
      <li>Firewall and malware scanning</li>
      <li>Limited access to personal data</li>
      <li>Regular security audits</li>
      <li>Secure payment gateways (we do not store card data)</li>
  </ul>
  No system is 100% secure, but we take reasonable steps to protect your information.
  <br><br>

  <dt class="heading-4">10. Your Rights</dt>
  <dt class="heading-5">EU/UK Users (GDPR)</dt>
  You have the right to:
  <ul class="list-marked">
      <li>Access your data</li>
      <li>Correct inaccurate data</li>
      <li>Delete your data (“right to be forgotten”)</li>
      <li>Restrict processing</li>
      <li>Object to processing</li>
      <li>Data portability</li>
      <li>Withdraw consent</li>
  </ul>
  <br><br>
  <dt class="heading-5">California Users (CCPA/CPRA)</dt>
  You have the right to:
  <ul class="list-marked">
      <li>Know what data is collected</li>
      <li>Request deletion</li>
      <li>Opt‑out of data sharing</li>
      <li>Non‑discrimination for exercising rights</li>
  </ul>
  <br><br>
  <dt class="heading-5">Canada (PIPEDA)</dt>
  You have the right to:
  <ul class="list-marked">
      <li>Access your data</li>
      <li>Challenge accuracy</li>
      <li>Withdraw consent</li>
  </ul>
  <br><br>
  <dt class="heading-5">Australia</dt>
  You have the right to:
  <ul class="list-marked">
      <li>Access and correct personal information</li>
      <li>File complaints regarding misuse</li>
  </ul>
  To exercise any rights, contact us via the <a href="/en/contact">Contact</a> page.
  <br><br>

  <dt class="heading-4">11. Children’s Privacy (COPPA)</dt>
  We do not knowingly collect information from children under 13. If we learn that a child under 13 has created an account, we will delete it promptly.
  <br><br>

  <dt class="heading-4">12. Do Not Track (DNT)</dt>
  We honor Do Not Track signals where technically feasible.
  <br><br>

  <dt class="heading-4">13. Data Breach Notification</dt>
  If a data breach occurs, we will notify affected users:
  <ul class="list-marked">
      <li>Via email or on‑site notification</li>
      <li>Within a reasonable timeframe (typically within 7 business days)</li>
  </ul>
  <br><br>

  <dt class="heading-4">14. Email & Communication Compliance (CAN‑SPAM)</dt>
  We agree to:
  <ul class="list-marked">
      <li>Not use misleading subjects or sender information</li>
      <li>Provide a clear unsubscribe option</li>
      <li>Honor unsubscribe requests promptly</li>
  </ul>
  You may unsubscribe at any time.
  <br><br>

  <dt class="heading-4">15. Changes to This Privacy Policy</dt>
  We may update this Privacy Policy periodically. Changes will be posted on this page with an updated “Last Updated” date.
  <br><br>

  <dt class="heading-4">16. Contact Us</dt>
  If you have questions about this Privacy Policy, you may contact us using the <a href="/en/contact">Contact</a> form on the website.
  <br>