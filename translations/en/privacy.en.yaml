privacy.section: |
  This privacy policy has been compiled to better serve those who are concerned with how their 'Personally Identifiable Information' (PII) is being used online. PII, as described in US privacy law and information security, is information that can be used on its own or with other information to identify, contact, or locate a single person, or to identify an individual in context. Please read our privacy policy carefully to get a clear understanding of how we collect, use, protect or otherwise handle your Personally Identifiable Information in accordance with our website.
  <br><br>

  <dt class="heading-4">What personal information do we collect from the people that visit our blog, website or app?</dt>
  When ordering or registering on our site, as appropriate, you may be asked to enter your name, email address or other details to help you with your experience.
  <br><br>

  <dt class="heading-4">When do we collect information?</dt>
  We collect information from you when you register on our site, fill out a form or enter information on our site.
  <br><br>

  <dt class="heading-4">How do we use your information?</dt>
  We may use the information we collect from you when you register, make a purchase, sign up for our newsletter, respond to a survey or marketing communication, surf the website, or use certain other site features in the following ways:
  <ul class="list-marked">
      <li>To personalize your experience and to allow us to deliver the type of content and product offerings in which you are most interested.</li>
      <li>To improve our website in order to better serve you.</li>
      <li>To allow us to better service you in responding to your customer service requests.</li>
      <li>To administer a contest, promotion, survey or other site feature.</li>
  </ul>
  <br><br>

  <dt class="heading-4">How do we protect your information?</dt>
  Our website is scanned on a regular basis for security holes and known vulnerabilities in order to make your visit to our site as safe as possible.
  <br>
  We use regular Malware Scanning.
  <br>
  Your personal information is contained behind secured networks and is only accessible by a limited number of persons who have special access rights to such systems, and are required to keep the information confidential. In addition, all sensitive/credit information you supply is encrypted via Secure Socket Layer (SSL) technology.
  <br>
  We implement a variety of security measures when a user enters, submits, or accesses their information to maintain the safety of your personal information.
  <br>
  All transactions are processed through a gateway provider and are not stored or processed on our servers.
  <br><br>

  <dt class="heading-4">Do we use 'cookies'?</dt>
  Yes. Cookies are small files that a site or its service provider transfers to your computer's hard drive through your Web browser (if you allow) that enables the site's or service provider's systems to recognize your browser and capture and remember certain information. For instance, we use cookies to help us remember and process the items in your shopping cart. They are also used to help us understand your preferences based on previous or current site activity, which enables us to provide you with improved services. We also use cookies to help us compile aggregate data about site traffic and site interaction so that we can offer better site experiences and tools in the future.
  <br><br>

  <dt class="heading-4">We use cookies to:</dt>
  <ul class="list-marked">
      <li>Understand and save user's preferences for future visits.</li>
      <li>Compile aggregate data about site traffic and site interactions in order to offer better site experiences and tools in the future. We may also use trusted third-party services that track this information on our behalf.</li>
  </ul>
  You can choose to have your computer warn you each time a cookie is being sent, or you can choose to turn off all cookies. You do this through your browser settings. Since browser is a little different, look at your browser's Help Menu to learn the correct way to modify your cookies.
  If you turn cookies off, it won't affect the user's experience.
  <br><br>

  <dt class="heading-4">Third-party disclosure</dt>
  We do not sell, trade, or otherwise transfer to outside parties your Personally Identifiable Information.
  <br><br>

  <dt class="heading-4">Third-party links</dt>
  We do not include or offer third-party products or services on our website.
  <dt class="heading-4">Google</dt>
  Google's advertising requirements can be summed up by Google's Advertising Principles. They are put in place to provide a positive experience for users. <a href="https://support.google.com/adwordspolicy/answer/1316548?hl=en">https://support.google.com/adwordspolicy/answer/1316548?hl=en</a>
  <br>
  We use Google AdSense Advertising on our website.
  <br>
  Google, as a third-party vendor, uses cookies to serve ads on our site. Google's use of the DART cookie enables it to serve ads to our users based on previous visits to our site and other sites on the Internet. Users may opt-out of the use of the DART cookie by visiting the Google Ad and Content Network privacy policy.
  <dt class="heading-4">We have implemented the following:</dt>
  <ul class="list-marked">
      <li>Demographics and Interests Reporting</li>
  </ul>
  <br>
  We, along with third-party vendors such as Google use first-party cookies (such as the Google Analytics cookies) and third-party cookies (such as the DoubleClick cookie) or other third-party identifiers together to compile data regarding user interactions with ad impressions and other ad service functions as they relate to our website.
  <br><br>

  <dt class="heading-4">Opting out:</dt>
  Users can set preferences for how Google advertises to you using the Google Ad Settings page. Alternatively, you can opt out by visiting the Network Advertising Initiative Opt Out page or by using the Google Analytics Opt Out Browser add on.
  <br><br>

  <dt class="heading-4">California Online Privacy Protection Act</dt>
  CalOPPA is the first state law in the nation to require commercial websites and online services to post a privacy policy. The law's reach stretches well beyond California to require any person or company in the United States (and conceivably the world) that operates websites collecting Personally Identifiable Information from California consumers to post a conspicuous privacy policy on its website stating exactly the information being collected and those individuals or companies with whom it is being shared.
  <br><br>

  <dt class="heading-4">According to CalOPPA, we agree to the following:</dt>
  Users can visit our site anonymously.
  <br>
  Once this privacy policy is created, we will add a link to it on our home page or as a minimum, on the first significant page after entering our website.
  <br>
  Our Privacy Policy link includes the word 'Privacy' and can easily be found on the page specified above.
  <br>
  You will be notified of any Privacy Policy changes:
  <ul class="list-marked">
      <li>On our Privacy Policy Page</li>
  </ul>
  Can change your personal information:
  <ul class="list-marked">
      <li>By emailing us</li>
      <li>By chatting with us or by sending us a support ticket</li>
  </ul>
  <br><br>

  <dt class="heading-4">How does our site handle Do Not Track signals?</dt>
  We honor Do Not Track signals and Do Not Track, plant cookies, or use advertising when a Do Not Track (DNT) browser mechanism is in place.
  <br><br>

  <dt class="heading-4">Does our site allow third-party behavioral tracking?</dt>
  It's also important to note that we do not allow third-party behavioral tracking.
  <br><br>

  <dt class="heading-4">COPPA (Children Online Privacy Protection Act)</dt>
  When it comes to the collection of personal information from children under the age of 13 years old, the Children's Online Privacy Protection Act (COPPA) puts parents in control. The Federal Trade Commission, United States' consumer protection agency, enforces the COPPA Rule, which spells out what operators of websites and online services must do to protect children's privacy and safety online.
  <br>
  We do not specifically market to children under the age of 13 years old.
  <br><br>

  <dt class="heading-4">Fair Information Practices</dt>
  The Fair Information Practices Principles form the backbone of privacy law in the United States and the concepts they include have played a significant role in the development of data protection laws around the globe. Understanding the Fair Information Practice Principles and how they should be implemented is critical to comply with the various privacy laws that protect personal information.
  <br><br>

  <dt class="heading-4">In order to be in line with Fair Information Practices we will take the following responsive action, should a data breach occur:</dt>
  We will notify the users via in-site notification
  <ul class="list-marked">
      <li>Within 7 business days</li>
  </ul>
  We also agree to the Individual Redress Principle which requires that individuals have the right to legally pursue enforceable rights against data collectors and processors who fail to adhere to the law. This principle requires not only that individuals have enforceable rights against data users, but also that individuals have recourse to courts or government agencies to investigate and/or prosecute non-compliance by data processors.
  <br><br>

  <dt class="heading-4">CAN SPAM Act</dt>
  The CAN-SPAM Act is a law that sets the rules for commercial email, establishes requirements for commercial messages, gives recipients the right to have emails stopped from being sent to them, and spells out tough penalties for violations.
  <br><br>

  <dt class="heading-4">We collect your email address in order to:</dt>
  <ul class="list-marked">
      <li>Send information, respond to inquiries, and/or other requests or questions</li>
      <li>Process orders and to send information and updates pertaining to orders.</li>
      <li>Send you additional information related to your product and/or service</li>
  </ul>
  <br><br>

  <dt class="heading-4">To be in accordance with CANSPAM, we agree to the following:</dt>
  <ul class="list-marked">
      <li>Not use false or misleading subjects or email addresses.</li>
  </ul>
  <br>

  <dt class="heading-4">If at any time you would like to unsubscribe from receiving future emails, you can email us at</dt>
  and we will promptly remove you from ALL correspondence.
  <br><br>

  <dt class="heading-4">Contacting Us</dt>
  If there are any questions regarding this privacy policy, you may contact us using the <a href="/en/contact">Contact</a> form.
  <br>