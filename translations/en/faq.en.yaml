faq.one_title_txt: "What can I do to have access on this site?"
faq.one_content_txt: |
  You must be a patron or donor, and send us a message using the contact form
  or a private message on our <a href="https://facebook.com/OktoDark">Facebook</a> page
  with your real name.
  <br>The account for our site will be sent to your email with all connection details.

faq.two_title_txt: "What does the voting system mean?"
faq.two_content_txt: >
  From Tier II, anyone can vote on characters, the game world, etc.
  Everyone is involved in development.

faq.three_title_txt: "Explain more about the voting system, please"
faq.three_content_txt: |
  You must be a patron or donor to see the voting system. It's secret.
  <i class="fas fa-user-ninja"></i>