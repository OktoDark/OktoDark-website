rescontent.mods.text: |
  <p>With 1&euro; you can download anything, every day without restriction.</p>
  <p><b>Why pay 1&euro;?</b>
  <ul><li>With your payment we will have more hosting space for mods.</li></ul></p>
  <p><b>Every month?</b>
  <ul><li>Yes, it's a monthly subscription.</li></ul></p>
  <p>For subscription please visit our <a href="https://www.patreon.com/OktoDark">Patreon</a> page and choose your wishes.</p>