faq.one_title_txt: "我如何才能获得对此网站的访问权限？"
faq.one_content_txt: |
  您必须是赞助人或捐助人，并使用联系表单向我们发送消息
  或通过我们的<a href="https://facebook.com/OktoDark">Facebook</a>页面
  用您的真实姓名发送私人消息。
  <br>我们网站的账户将通过电子邮件发送给您，并包含所有连接详细信息。

faq.two_title_txt: "投票系统意味着什么？"
faq.two_content_txt: >
  从Tier II开始，任何人都可以对角色、游戏世界等进行投票。
  每个人都参与开发。

faq.three_title_txt: "请进一步解释投票系统"
faq.three_content_txt: |
  您必须是赞助人或捐助人才能看到投票系统。它是秘密的。
