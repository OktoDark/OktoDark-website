privacy.subtitle: "了解我们如何收集、使用、存储和保护您的个人信息。"
privacy.section: |
  <p class="text-light small mb-4">
    最后更新时间：2029年5月29日
  </p>

  本隐私政策阐明了当您使用我们的网站、论坛、市场、博客或任何相关服务（统称“平台”）时，OktoDark Studios（“我们”、“我们的”）如何收集、使用、存储和保护您的个人信息。我们遵守全球主要的隐私法规，包括：
  <ul class="list-marked">
      <li>欧盟通用数据保护条例 (GDPR)</li>
      <li>英国 GDPR</li>
      <li>加州消费者隐私法 (CCPA/CPRA)</li>
      <li>加州在线隐私保护法 (CalOPPA)</li>
      <li>儿童在线隐私保护法 (COPPA)</li>
      <li>美国联邦和州隐私原则</li>
      <li>加拿大 PIPEDA</li>
      <li>澳大利亚隐私法</li>
      <li>国际数据传输要求</li>
  </ul>
  通过使用我们的平台，即表示您同意本隐私政策中所述的做法。
  <br><br>

  <dt class="heading-4">1. 我们收集的信息</dt>
  我们可能会收集以下类别的个人信息：
  <br><br>
  <dt class="heading-5">1.1 您直接提供的信息</dt>
  <ul class="list-marked">
      <li>姓名或用户名</li>
      <li>电子邮件地址</li>
      <li>密码（加密加密后存储）</li>
      <li>个人资料详情（头像、简介、社交媒体链接）</li>
      <li>论坛帖子、评论、私信消息</li>
      <li>市场上传的内容和元数据</li>
      <li>支持请求或表单提交</li>
  </ul>
  <br><br>
  <dt class="heading-5">1.2 自动收集的信息</dt>
  <ul class="list-marked">
      <li>IP 地址</li>
      <li>浏览器类型和版本</li>
      <li>设备信息</li>
      <li>操作系统</li>
      <li>引荐 URL</li>
      <li>访问的页面和采取的操作</li>
      <li>Cookie 和追踪标识符</li>
  </ul>
  <br><br>
  <dt class="heading-5">1.3 可选信息</dt>
  <ul class="list-marked">
      <li>订阅时事通讯</li>
      <li>通知偏好设置</li>
      <li>市场卖家信息</li>
      <li>付款信息（由第三方支付服务商处理；我们不存储信用卡卡号数据）</li>
  </ul>
  <br><br>

  <dt class="heading-4">2. 我们如何使用您的信息</dt>
  我们使用您的信息来：
  <ul class="list-marked">
      <li>创建和管理您的账户</li>
      <li>提供对论坛、市场和平台功能的访问</li>
      <li>个性化您的体验</li>
      <li>改进我们的网站和服务</li>
      <li>回应支持请求</li>
      <li>发送通知和更新（如果已启用）</li>
      <li>预防欺诈、滥用和安全威胁</li>
      <li>履行法律义务</li>
  </ul>
  我们不会出售您的个人信息。
  <br><br>

  <dt class="heading-4">3. 处理的法律依据 (GDPR/UK GDPR)</dt>
  对于欧盟/英国的用户，我们在以下法律依据下处理数据：
  <ul class="list-marked">
      <li><strong>合同</strong> — 为您提供平台的访问权限</li>
      <li><strong>同意</strong> — 用于时事通讯、Cookie、数据分析</li>
      <li><strong>合法利益</strong> — 用于保护和改善平台</li>
      <li><strong>法律义务</strong> — 以遵守适用法律</li>
  </ul>
  您可以随时撤回您的同意。
  <br><br>

  <dt class="heading-4">4. Cookie 和追踪技术</dt>
  我们使用 Cookie 来：
  <ul class="list-marked">
      <li>记住您的偏好设置</li>
      <li>维护登录会话状态</li>
      <li>分析网站流量</li>
      <li>改善用户体验</li>
      <li>启用市场和论坛功能</li>
  </ul>
  您可以在浏览器设置中禁用 Cookie。但为了平台正常运行，可能必须启用必不可少的 Cookie。
  <br><br>

  <dt class="heading-4">5. 第三方服务</dt>
  我们可能会使用值得信赖的第三方服务商来进行：
  <ul class="list-marked">
      <li>数据分析（例如 Google Analytics）</li>
      <li>广告展示（例如 Google AdSense）</li>
      <li>支付处理</li>
      <li>邮件发送</li>
      <li>安全及防止滥用系统</li>
  </ul>
  这些服务商可能会使用 Cookie 或追踪技术。除分析或广告所需外，我们不允许第三方进行行为追踪。
  <br><br>

  <dt class="heading-4">6. 数据共享</dt>
  我们不会出售或交易您的个人信息。我们仅在以下情况下共享数据：
  <ul class="list-marked">
      <li>代表我们行动的服务商</li>
      <li>在法律要求下的司法机关</li>
      <li>市场卖家（仅限于与购买相关的信息）</li>
      <li>安全与欺诈预防合作伙伴</li>
  </ul>
  所有第三方必须遵守严格的保密和数据保护要求。
  <br><br>

  <dt class="heading-4">7. 国际数据传输</dt>
  您的信息可能会在以下地区处理：
  <ul class="list-marked">
      <li>欧盟</li>
      <li>美国</li>
      <li>我们服务商运营所在的其他国家/地区</li>
  </ul>
  我们使用法律认可的保护措施，例如：
  <ul class="list-marked">
      <li>标准合同条款 (SCC)</li>
      <li>充分性认定</li>
      <li>合同保护机制</li>
  </ul>
  <br><br>

  <dt class="heading-4">8. 数据保留</dt>
  我们仅在必要时保留您的信息，以便：
  <ul class="list-marked">
      <li>提供服务</li>
      <li>履行法律义务</li>
      <li>解决争议</li>
      <li>执行服务条款协议</li>
  </ul>
  您可以随时请求删除您的账户。
  <br><br>

  <dt class="heading-4">9. 安全措施</dt>
  我们实施了行业标准的安全性措施：
  <ul class="list-marked">
      <li>加密密码</li>
      <li>SSL/TLS 加密传输</li>
      <li>防火墙和恶意软件扫描</li>
      <li>限制对个人数据的访问权限</li>
      <li>定期进行安全审计</li>
      <li>安全支付网关（我们不存储信用卡数据）</li>
  </ul>
  没有任何系统是100%安全的，但我们采取了合理的步骤来保护您的信息。
  <br><br>

  <dt class="heading-4">10. 您的权利</dt>
  <dt class="heading-5">欧盟/英国用户 (GDPR)</dt>
  您有权：
  <ul class="list-marked">
      <li>访问您的数据</li>
      <li>纠正不准确的数据</li>
      <li>删除您的数据（“被遗忘权”）</li>
      <li>限制数据处理</li>
      <li>反对数据处理</li>
      <li>数据可携性</li>
      <li>撤回同意</li>
  </ul>
  <br><br>
  <dt class="heading-5">加州用户 (CCPA/CPRA)</dt>
  您有权：
  <ul class="list-marked">
      <li>知晓收集了哪些数据</li>
      <li>请求删除</li>
      <li>选择退出数据共享</li>
      <li>不会因行使权利而受到歧视</li>
  </ul>
  <br><br>
  <dt class="heading-5">加拿大用户 (PIPEDA)</dt>
  您有权：
  <ul class="list-marked">
      <li>访问您的数据</li>
      <li>对准确性提出质疑</li>
      <li>撤回同意</li>
  </ul>
  <br><br>
  <dt class="heading-5">澳大利亚用户</dt>
  您有权：
  <ul class="list-marked">
      <li>访问并纠正个人信息</li>
      <li>就数据滥用提出申诉</li>
  </ul>
  要行使上述任何权利，请通过 <a href="/zh/contact">联系我们</a> 页面与我们取得联系。
  <br><br>

  <dt class="heading-4">11. 儿童隐私 (COPPA)</dt>
  我们不会有意收集 13 岁以下儿童的信息。如果我们得知 13 岁以下的儿童创建了账户，我们将立即予以删除。
  <br><br>

  <dt class="heading-4">12. 请勿追踪 (DNT)</dt>
  在技术可行的情况下，我们尊重“请勿追踪 (DNT)”信号。
  <br><br>

  <dt class="heading-4">13. 数据泄露通知</dt>
  如果发生数据泄露，我们将通知受影响的用户：
  <ul class="list-marked">
      <li>通过电子邮件或网站内通知</li>
      <li>在合理的时间内（通常在 7 个工作日内）</li>
  </ul>
  <br><br>

  <dt class="heading-4">14. 电子邮件和通信合规 (CAN-SPAM)</dt>
  我们同意：
  <ul class="list-marked">
      <li>不使用误导性主题或发件人信息</li>
      <li>提供清晰的退订退订选项</li>
      <li>及时处理退订请求</li>
  </ul>
  您可以随时退订。
  <br><br>

  <dt class="heading-4">15. 本隐私政策的变更</dt>
  我们可能会定期更新本隐私政策。变更将发布在此页面上，并更新“最后更新时间”日期。
  <br><br>

  <dt class="heading-4">16. 联系我们</dt>
  如果您对本隐私政策有任何疑问，可以使用网站上的 <a href="/zh/contact">联系我们</a> 表单与我们取得联系。
  <br>