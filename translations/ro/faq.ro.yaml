faq.one_title_txt: "Ce pot face pentru a avea acces pe acest site?"
faq.one_content_txt: |
  Trebuie să fii patron sau donator și să ne trimiți un mesaj folosind formularul de contact
  sau un mesaj privat pe pagina noastră de <a href="https://facebook.com/OktoDark">Facebook</a>
  cu numele tău real.
  <br>Contul pentru site îl vei primi pe e-mail cu toate detaliile necesare.

faq.two_title_txt: "Ce înseamnă sistemul de vot?"
faq.two_content_txt: >
  De la Tier II, oricine poate vota personaje, lumea jocului etc.
  Toți sunt implicați în dezvoltare.

faq.three_title_txt: "Explică mai multe despre sistemul de vot"
faq.three_content_txt: |
  Trebuie să fii patron sau donator pentru a vedea sistemul de vot. Este secret.
