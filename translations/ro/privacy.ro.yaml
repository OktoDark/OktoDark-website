privacy.subtitle: "Află cum colectăm, folosim, stocăm și protejăm informațiile tale personale."
privacy.section: |
  <p class="text-light small mb-4">
    Ultima actualizare: 29.05.2026
  </p>

  Această Politică de Confidențialitate explică modul în care OktoDark Studios („noi”, „nouă”, „nostru”) colectează, utilizează, stochează și protejează informațiile tale personale atunci când utilizezi site-ul nostru web, forumul, piața, blogul sau orice servicii conexe („Platforma”). Ne conformăm reglementărilor majore globale privind confidențialitatea, inclusiv:
  <ul class="list-marked">
      <li>Regulamentul General privind Protecția Datelor al UE (GDPR)</li>
      <li>GDPR din Marea Britanie</li>
      <li>California Consumer Privacy Act (CCPA/CPRA)</li>
      <li>California Online Privacy Protection Act (CalOPPA)</li>
      <li>Children’s Online Privacy Protection Act (COPPA)</li>
      <li>Principiile federale și de stat privind confidențialitatea din SUA</li>
      <li>PIPEDA din Canada</li>
      <li>Legea australiană privind confidențialitatea</li>
      <li>Cerințele privind transferul internațional de date</li>
  </ul>
  Prin utilizarea Platformei noastre, ești de acord cu practicile descrise în această Politică de Confidențialitate.
  <br><br>

  <dt class="heading-4">1. Informații pe care le colectăm</dt>
  Putem colecta următoarele categorii de informații:
  <br><br>
  <dt class="heading-5">1.1 Informații pe care le furnizezi direct</dt>
  <ul class="list-marked">
      <li>Nume sau nume de utilizator</li>
      <li>Adresă de e-mail</li>
      <li>Parolă (criptată)</li>
      <li>Detalii de profil (avatar, biografie, linkuri sociale)</li>
      <li>Postări pe forum, comentarii, mesaje</li>
      <li>Încărcări pe piață și metadate</li>
      <li>Solicitări de suport sau trimiteri de formulare</li>
  </ul>
  <br><br>
  <dt class="heading-5">1.2 Informații colectate automat</dt>
  <ul class="list-marked">
      <li>Adresă IP</li>
      <li>Tipul și versiunea browserului</li>
      <li>Informații despre dispozitiv</li>
      <li>Sistem de operare</li>
      <li>URL-uri de referință</li>
      <li>Pagini vizitate și acțiuni întreprinse</li>
      <li>Cookie-uri și identificatori de urmărire</li>
  </ul>
  <br><br>
  <dt class="heading-5">1.3 Informații opționale</dt>
  <ul class="list-marked">
      <li>Abonamente la newsletter</li>
      <li>Preferințe de notificare</li>
      <li>Informații despre vânzătorul din piață</li>
      <li>Informații de plată (procesate de furnizori terți; nu stocăm datele cardului)</li>
  </ul>
  <br><br>

  <dt class="heading-4">2. Cum utilizăm informațiile tale</dt>
  Utilizăm informațiile tale pentru a:
  <ul class="list-marked">
      <li>Crea și gestiona contul tău</li>
      <li>Oferi acces la forum, piață și funcțiile platformei</li>
      <li>Personaliza experiența ta</li>
      <li>Îmbunătăți site-ul și serviciile noastre</li>
      <li>Răspunde solicitărilor de suport</li>
      <li>Trimite notificări și actualizări (dacă sunt activate)</li>
      <li>Preveni frauda, abuzul și amenințările de securitate</li>
      <li>Respecta obligațiile legale</li>
  </ul>
  Nu vindem informațiile tale personale.
  <br><br>

  <dt class="heading-4">3. Baze legale pentru prelucrare (GDPR/UK GDPR)</dt>
  Pentru utilizatorii din UE/Marea Britanie, prelucrăm datele în baza acestor temeiuri legale:
  <ul class="list-marked">
      <li><strong>Contract</strong> — pentru a-ți oferi acces la platformă</li>
      <li><strong>Consimțământ</strong> — pentru newslettere, cookie-uri, analize</li>
      <li><strong>Interes legitim</strong> — pentru a securiza și îmbunătăți platforma</li>
      <li><strong>Obligație legală</strong> — pentru a respecta legile aplicabile</li>
  </ul>
  Îți poți retrage consimțământul în orice moment.
  <br><br>

  <dt class="heading-4">4. Cookie-uri și tehnologii de urmărire</dt>
  Utilizăm cookie-uri pentru a:
  <ul class="list-marked">
      <li>Reține preferințele tale</li>
      <li>Menține sesiunile de conectare</li>
      <li>Analiza traficul site-ului</li>
      <li>Îmbunătăți experiența utilizatorului</li>
      <li>Activa funcționalitatea pieței și a forumului</li>
  </ul>
  Poți dezactiva cookie-urile din setările browserului tău. Cookie-urile esențiale pot fi necesare pentru funcționarea platformei.
  <br><br>

  <dt class="heading-4">5. Servicii terțe</dt>
  Putem utiliza furnizori terți de încredere pentru:
  <ul class="list-marked">
      <li>Analize (de exemplu, Google Analytics)</li>
      <li>Publicitate (de exemplu, Google AdSense)</li>
      <li>Procesarea plăților</li>
      <li>Livrarea e-mailurilor</li>
      <li>Sisteme de securitate și anti-abuz</li>
  </ul>
  Acești furnizori pot utiliza cookie-uri sau tehnologii de urmărire. Nu permitem urmărirea comportamentală de către terți dincolo de ceea ce este necesar pentru analize sau reclame.
  <br><br>

  <dt class="heading-4">6. Partajarea datelor</dt>
  Nu vindem și nu comercializăm informațiile tale personale. Putem partaja date doar cu:
  <ul class="list-marked">
      <li>Furnizori de servicii care acționează în numele nostru</li>
      <li>Autoritățile legale atunci când este necesar</li>
      <li>Vânzătorii din piață (limitate la informațiile legate de achiziții)</li>
      <li>Parteneri de securitate și prevenire a fraudei</li>
  </ul>
  Toți terții trebuie să respecte cerințe stricte de confidențialitate și protecție a datelor.
  <br><br>

  <dt class="heading-4">7. Transferuri internaționale de date</dt>
  Informațiile tale pot fi prelucrate în:
  <ul class="list-marked">
      <li>Uniunea Europeană</li>
      <li>Statele Unite</li>
      <li>Alte țări în care operează furnizorii noștri de servicii</li>
  </ul>
  Utilizăm garanții recunoscute legal, cum ar fi:
  <ul class="list-marked">
      <li>Clauze Contractuale Standard (SCC)</li>
      <li>Decizii de adecvare</li>
      <li>Protecții contractuale</li>
  </ul>
  <br><br>

  <dt class="heading-4">8. Retenția datelor</dt>
  Reținem informațiile tale doar atât timp cât este necesar pentru a:
  <ul class="list-marked">
      <li>Furniza servicii</li>
      <li>Respecta obligațiile legale</li>
      <li>Soluționa dispute</li>
      <li>Aplica acorduri</li>
  </ul>
  Poți solicita ștergerea contului tău în orice moment.
  <br><br>

  <dt class="heading-4">9. Măsuri de securitate</dt>
  Implementăm practici de securitate standard în industrie:
  <ul class="list-marked">
      <li>Parole criptate</li>
      <li>Criptare SSL/TLS</li>
      <li>Scanare firewall și malware</li>
      <li>Acces limitat la datele personale</li>
      <li>Audituri regulate de securitate</li>
      <li>Gateway-uri de plată securizate (nu stocăm datele cardului)</li>
  </ul>
  Niciun sistem nu este 100% sigur, dar luăm măsuri rezonabile pentru a-ți proteja informațiile.
  <br><br>

  <dt class="heading-4">10. Drepturile tale</dt>
  <dt class="heading-5">Utilizatori UE/Marea Britanie (GDPR)</dt>
  Ai dreptul de a:
  <ul class="list-marked">
      <li>Accesa datele tale</li>
      <li>Corecta datele inexacte</li>
      <li>Șterge datele tale („dreptul de a fi uitat”)</li>
      <li>Restricționa prelucrarea</li>
      <li>Te opune prelucrării</li>
      <li>Portabilitatea datelor</li>
      <li>Retrage consimțământul</li>
  </ul>
  <br><br>
  <dt class="heading-5">Utilizatori din California (CCPA/CPRA)</dt>
  Ai dreptul de a:
  <ul class="list-marked">
      <li>Ști ce date sunt colectate</li>
      <li>Solicita ștergerea</li>
      <li>Renunța la partajarea datelor</li>
      <li>Non-discriminare pentru exercitarea drepturilor</li>
  </ul>
  <br><br>
  <dt class="heading-5">Canada (PIPEDA)</dt>
  Ai dreptul de a:
  <ul class="list-marked">
      <li>Accesa datele tale</li>
      <li>Contesta acuratețea</li>
      <li>Retrage consimțământul</li>
  </ul>
  <br><br>
  <dt class="heading-5">Australia</dt>
  Ai dreptul de a:
  <ul class="list-marked">
      <li>Accesa și corecta informațiile personale</li>
      <li>Depune plângeri privind utilizarea abuzivă</li>
  </ul>
  Pentru a-ți exercita oricare dintre drepturi, contactează-ne prin pagina de <a href="/ro/contact">Contact</a>.
  <br><br>

  <dt class="heading-4">11. Confidențialitatea copiilor (COPPA)</dt>
  Nu colectăm cu bună știință informații de la copii sub 13 ani. Dacă aflăm că un copil sub 13 ani a creat un cont, îl vom șterge prompt.
  <br><br>

  <dt class="heading-4">12. Nu urmări (DNT)</dt>
  Respectăm semnalele Do Not Track acolo unde este fezabil din punct de vedere tehnic.
  <br><br>

  <dt class="heading-4">13. Notificarea încălcării datelor</dt>
  Dacă are loc o încălcare a datelor, vom notifica utilizatorii afectați:
  <ul class="list-marked">
      <li>Prin e-mail sau notificare pe site</li>
      <li>Într-un termen rezonabil (de obicei în termen de 7 zile lucrătoare)</li>
  </ul>
  <br><br>

  <dt class="heading-4">14. Conformitatea e-mailurilor și a comunicărilor (CAN-SPAM)</dt>
  Suntem de acord să:
  <ul class="list-marked">
      <li>Nu utilizăm subiecte sau informații de expeditor înșelătoare</li>
      <li>Oferim o opțiune clară de dezabonare</li>
      <li>Respectăm prompt solicitările de dezabonare</li>
  </ul>
  Te poți dezabona în orice moment.
  <br><br>

  <dt class="heading-4">15. Modificări ale acestei Politici de Confidențialitate</dt>
  Putem actualiza periodic această Politică de Confidențialitate. Modificările vor fi publicate pe această pagină cu o dată „Ultima actualizare” actualizată.
  <br><br>

  <dt class="heading-4">16. Contactează-ne</dt>
  Dacă ai întrebări despre această Politică de Confidențialitate, ne poți contacta folosind formularul de <a href="/ro/contact">Contact</a> de pe site.
  <br>