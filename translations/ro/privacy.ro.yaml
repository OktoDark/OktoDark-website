privacy.section: |
  Această politică de confidențialitate a fost creată pentru a servi mai bine persoanelor care sunt preocupate de modul în care informațiile lor „de identificare personală” (PII) sunt utilizate online. PII, conform legislației americane privind confidențialitatea și securitatea informațiilor, reprezintă informații care pot fi folosite singure sau împreună cu alte date pentru a identifica, contacta sau localiza o persoană, sau pentru a identifica un individ în context. Te rugăm să citești cu atenție politica noastră de confidențialitate pentru a înțelege clar cum colectăm, folosim, protejăm sau gestionăm informațiile tale personale în conformitate cu site‑ul nostru.
  <br><br>

  <dt class="heading-4">Ce informații personale colectăm de la persoanele care vizitează blogul, site‑ul sau aplicația noastră?</dt>
  Atunci când comanzi sau te înregistrezi pe site, după caz, ți se poate cere să introduci numele, adresa de e‑mail sau alte detalii pentru a te ajuta în experiența ta.
  <br><br>

  <dt class="heading-4">Când colectăm informații?</dt>
  Colectăm informații de la tine atunci când te înregistrezi pe site, completezi un formular sau introduci informații pe site.
  <br><br>

  <dt class="heading-4">Cum folosim informațiile tale?</dt>
  Putem folosi informațiile pe care le colectăm de la tine atunci când te înregistrezi, faci o achiziție, te abonezi la newsletter, răspunzi la un sondaj sau comunicare de marketing, navighezi pe site sau folosești anumite funcții ale site‑ului în următoarele moduri:
  <ul class="list-marked">
      <li>Pentru a personaliza experiența ta și pentru a ne permite să îți oferim conținut și produse de interes pentru tine.</li>
      <li>Pentru a îmbunătăți site‑ul nostru pentru a te servi mai bine.</li>
      <li>Pentru a ne permite să îți oferim un suport mai bun în răspunsul la solicitările tale.</li>
      <li>Pentru a administra un concurs, promoție, sondaj sau altă funcție a site‑ului.</li>
  </ul>
  <br><br>

  <dt class="heading-4">Cum protejăm informațiile tale?</dt>
  Site‑ul nostru este scanat regulat pentru vulnerabilități și probleme de securitate pentru a face vizita ta cât mai sigură.
  <br>
  Folosim scanare regulată împotriva malware‑ului.
  <br>
  Informațiile tale personale sunt stocate în rețele securizate și sunt accesibile doar unui număr limitat de persoane care au drepturi speciale de acces și sunt obligate să păstreze confidențialitatea datelor. În plus, toate informațiile sensibile/de card pe care le furnizezi sunt criptate prin tehnologia SSL (Secure Socket Layer).
  <br>
  Implementăm o varietate de măsuri de securitate atunci când un utilizator introduce, trimite sau accesează informațiile sale pentru a menține siguranța datelor personale.
  <br>
  Toate tranzacțiile sunt procesate printr‑un furnizor extern și nu sunt stocate sau procesate pe serverele noastre.
  <br><br>

  <dt class="heading-4">Folosim „cookies”?</dt>
  Da. Cookie‑urile sunt fișiere mici pe care un site sau furnizorul său de servicii le transferă pe hard‑disk‑ul computerului tău prin browser (dacă permiți acest lucru), permițând sistemelor site‑ului să recunoască browserul și să rețină anumite informații. De exemplu, folosim cookie‑uri pentru a ne ajuta să reținem și să procesăm articolele din coșul tău. Ele sunt folosite și pentru a înțelege preferințele tale pe baza activității anterioare sau curente, ceea ce ne permite să îți oferim servicii îmbunătățite. De asemenea, folosim cookie‑uri pentru a compila date agregate despre traficul și interacțiunea pe site, astfel încât să putem oferi experiențe și instrumente mai bune în viitor.
  <br><br>

  <dt class="heading-4">Folosim cookie‑uri pentru:</dt>
  <ul class="list-marked">
      <li>Înțelegerea și salvarea preferințelor utilizatorilor pentru vizite viitoare.</li>
      <li>Compilarea datelor agregate despre trafic și interacțiuni pentru a oferi experiențe și instrumente mai bune în viitor. Putem folosi servicii terțe de încredere pentru a urmări aceste informații în numele nostru.</li>
  </ul>
  Poți alege să fii notificat de fiecare dată când un cookie este trimis sau poți dezactiva toate cookie‑urile. Acest lucru se face din setările browserului. Deoarece fiecare browser este diferit, consultă meniul de Ajutor pentru a afla cum să modifici cookie‑urile.
  Dacă dezactivezi cookie‑urile, experiența utilizatorului nu va fi afectată.
  <br><br>

  <dt class="heading-4">Divulgarea către terți</dt>
  Nu vindem, nu comercializăm și nu transferăm informațiile tale personale către părți externe.
  <br><br>

  <dt class="heading-4">Linkuri către terți</dt>
  Nu includem și nu oferim produse sau servicii ale terților pe site‑ul nostru.
  <dt class="heading-4">Google</dt>
  Cerințele de publicitate Google pot fi rezumate prin Principiile de Publicitate Google, create pentru a oferi o experiență pozitivă utilizatorilor. <a href="https://support.google.com/adwordspolicy/answer/1316548?hl=en">https://support.google.com/adwordspolicy/answer/1316548?hl=en</a>
  <br>
  Folosim Google AdSense pe site‑ul nostru.
  <br>
  Google, ca furnizor terț, folosește cookie‑uri pentru a afișa reclame pe site‑ul nostru. Utilizarea cookie‑ului DART permite Google să afișeze reclame utilizatorilor noștri pe baza vizitelor anterioare pe site‑ul nostru și pe alte site‑uri. Utilizatorii pot renunța la cookie‑ul DART vizitând politica de confidențialitate Google Ad and Content Network.
  <dt class="heading-4">Am implementat următoarele:</dt>
  <ul class="list-marked">
      <li>Raportare Demografică și de Interese</li>
  </ul>
  <br>
  Noi, împreună cu furnizori terți precum Google, folosim cookie‑uri first‑party (ex: Google Analytics) și cookie‑uri third‑party (ex: DoubleClick) sau alți identificatori terți pentru a compila date despre interacțiunile utilizatorilor cu afișările de reclame și alte funcții de publicitate.
  <br><br>

  <dt class="heading-4">Renunțare:</dt>
  Utilizatorii pot seta preferințele privind modul în care Google afișează reclame folosind pagina Google Ad Settings. Alternativ, pot renunța vizitând pagina Network Advertising Initiative Opt Out sau folosind extensia Google Analytics Opt Out.
  <br><br>

  <dt class="heading-4">California Online Privacy Protection Act</dt>
  CalOPPA este prima lege din SUA care cere site‑urilor comerciale și serviciilor online să afișeze o politică de confidențialitate. Legea se aplică oricărei companii care colectează informații personale de la consumatori din California.
  <br><br>

  <dt class="heading-4">Conform CalOPPA, suntem de acord cu următoarele:</dt>
  Utilizatorii pot vizita site‑ul nostru anonim.
  <br>
  Odată creată această politică de confidențialitate, vom adăuga un link către ea pe pagina principală sau pe prima pagină importantă după accesarea site‑ului.
  <br>
  Linkul către Politica de Confidențialitate include cuvântul „Privacy” și poate fi găsit ușor.
  <br>
  Vei fi notificat despre orice modificare a politicii:
  <ul class="list-marked">
      <li>Pe pagina Politicii de Confidențialitate</li>
  </ul>
  Poți modifica informațiile tale personale:
  <ul class="list-marked">
      <li>Prin e‑mail</li>
      <li>Prin chat sau trimiterea unui tichet de suport</li>
  </ul>
  <br><br>

  <dt class="heading-4">Cum gestionăm semnalele Do Not Track?</dt>
  Respectăm semnalele Do Not Track și nu plantăm cookie‑uri și nu folosim publicitate atunci când mecanismul DNT este activ.
  <br><br>

  <dt class="heading-4">Permite site‑ul nostru urmărirea comportamentală terță?</dt>
  Este important de menționat că nu permitem urmărirea comportamentală de către terți.
  <br><br>

  <dt class="heading-4">COPPA (Children Online Privacy Protection Act)</dt>
  În ceea ce privește colectarea informațiilor personale de la copii sub 13 ani, COPPA pune părinții în control. Federal Trade Commission aplică regulile COPPA, care stabilesc ce trebuie să facă operatorii site‑urilor pentru a proteja confidențialitatea copiilor.
  <br>
  Nu ne adresăm în mod specific copiilor sub 13 ani.
  <br><br>

  <dt class="heading-4">Principiile Fair Information Practices</dt>
  Aceste principii stau la baza legislației privind confidențialitatea în SUA și au influențat legile de protecție a datelor la nivel global.
  <br><br>

  <dt class="heading-4">Pentru a respecta aceste principii, vom lua următoarele măsuri în cazul unei breșe de securitate:</dt>
  Vom notifica utilizatorii prin notificare pe site
  <ul class="list-marked">
      <li>În termen de 7 zile lucrătoare</li>
  </ul>
  Suntem de acord și cu principiul Individual Redress, care permite utilizatorilor să urmărească legal operatorii de date care nu respectă legea.
  <br><br>

  <dt class="heading-4">CAN SPAM Act</dt>
  Această lege stabilește regulile pentru e‑mailurile comerciale, cerințele pentru mesajele comerciale și drepturile utilizatorilor de a opri primirea acestora.
  <br><br>

  <dt class="heading-4">Colectăm adresa ta de e‑mail pentru:</dt>
  <ul class="list-marked">
      <li>Trimiterea de informații, răspunsuri la întrebări sau alte solicitări</li>
      <li>Procesarea comenzilor și trimiterea actualizărilor aferente</li>
      <li>Trimiterea de informații suplimentare legate de produsul sau serviciul achiziționat</li>
  </ul>
  <br><br>

  <dt class="heading-4">Pentru a respecta CANSPAM, suntem de acord cu următoarele:</dt>
  <ul class="list-marked">
      <li>Să nu folosim subiecte sau adrese de e‑mail false sau înșelătoare.</li>
  </ul>
  <br>

  <dt class="heading-4">Dacă dorești să te dezabonezi de la e‑mailuri viitoare, ne poți trimite un e‑mail</dt>
  și te vom elimina prompt din toate comunicările.
  <br><br>

  <dt class="heading-4">Contactează‑ne</dt>
  Dacă ai întrebări legate de această politică de confidențialitate, ne poți contacta folosind informațiile de mai jos.
  <br>