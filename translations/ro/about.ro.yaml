about.description: |
  Suntem o echipă mică, internațională, care creează jocuri și aplicații.
  <br>Suntem un nou Game Studio fondat în 2015, dar întregul proiect OktoDark a fost creat în 2013.
  <br>Nu suntem cel mai mare dezvoltator de jocuri, căutăm noi talente care să se alăture echipei noastre
  și să o transforme într-o companie de dezvoltare de jocuri de talie mondială.
about.subtitle: "Toate informațiile despre noi"
title.our_team: "Echipa Noastră"
