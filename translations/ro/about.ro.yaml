about.description: |
  Suntem o echipă mică, internațională, care creează jocuri și aplicații.
  <br>Suntem un studio de jocuri nou, fondat în 2015, dar proiectul OktoDark a fost creat în 2013.
  <br>Nu suntem cel mai mare dezvoltator de jocuri, dar căutăm talente noi pentru a ne alătura echipei
  și a o transforma într-o companie de dezvoltare de jocuri de clasă mondială.