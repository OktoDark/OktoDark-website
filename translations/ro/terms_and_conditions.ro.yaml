  <dt class="heading-5">1. Definiții</dt>
  <strong>Vânzător:</strong> Orice utilizator care încarcă sau distribuie conținut digital pe Piața OktoDark.
  <br>
  <strong>Cumpărător:</strong> Orice utilizator care descarcă sau achiziționează conținut.
  <br>
  <strong>Conținut:</strong> Orice activ digital încărcat de un Vânzător, inclusiv moduri, instrumente, teme, scripturi, resurse sau documentație.
  <br>
  <strong>Platformă:</strong> Site-ul web OktoDark, piața și serviciile conexe.
  <br>
  <strong>OktoDark Studios:</strong> Operatorul și proprietarul platformei.
