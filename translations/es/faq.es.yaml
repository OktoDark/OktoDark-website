faq.one_title_txt: "¿Qué puedo hacer para tener acceso a este sitio?"
faq.one_content_txt: |
  Debe ser un patrocinador o donante, y enviarnos un mensaje mediante el formulario de contacto
  o un mensaje privado en nuestra página <a href="https://facebook.com/OktoDark">Facebook</a>
  con su nombre real.
  <br>La cuenta de nuestro sitio se enviará a su correo electrónico con todos los detalles de conexión.

faq.two_title_txt: "¿Qué significa el sistema de votación?"
faq.two_content_txt: >
  A partir de Tier II, cualquiera puede votar sobre personajes, el mundo del juego, etc.
  Todos participan en el desarrollo.

faq.three_title_txt: "Explicar más sobre el sistema de votación, por favor"
faq.three_content_txt: |
  Debe ser un patrocinador o donante para ver el sistema de votación. Es secreto.
  <i class="fas fa-user-ninja"></i>