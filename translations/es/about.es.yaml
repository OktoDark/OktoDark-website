about.description: |
  Somos un pequeño equipo internacional desarrollando juegos y aplicaciones.
  <br>Somos una nueva Studio de Juegos fundada en 2015, pero todo el proyecto OktoDark fue creado en 2013.
  <br>No somos los desarrolladores de juegos más grandes. Estamos buscando nuevos talentos para unirnos a nuestra equipo y convertirlo en una compañía de desarrollo de videojuegos de clase mundial.
