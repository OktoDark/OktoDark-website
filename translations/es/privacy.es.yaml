privacy.subtitle: "Conozca cómo recopilamos, usamos, almacenamos y protegemos su información personal."
privacy.section: |
  <p class="text-light small mb-4">
    Última actualización: 29.05.2029
  </p>

  Esta Política de Privacidad explica cómo OktoDark Studios (“nosotros”, “nos”, “nuestro”) recopila, utiliza, almacena y protege su información personal cuando utiliza nuestro sitio web, foro, mercado, blog o cualquier servicio relacionado (“Plataforma”). Cumplimos con las principales normativas globales de privacidad, incluyendo:
  <ul class="list-marked">
      <li>Reglamento General de Protección de Datos de la UE (GDPR)</li>
      <li>GDPR del Reino Unido</li>
      <li>Ley de Privacidad del Consumidor de California (CCPA/CPRA)</li>
      <li>Ley de Protección de la Privacidad en Línea de California (CalOPPA)</li>
      <li>Ley de Protección de la Privacidad Infantil en Línea (COPPA)</li>
      <li>Principios de privacidad federales y estatales de EE. UU.</li>
      <li>Ley PIPEDA de Canadá</li>
      <li>Ley de Privacidad de Australia</li>
      <li>Requisitos de transferencia internacional de datos</li>
  </ul>
  Al utilizar nuestra Plataforma, usted acepta las prácticas descritas en esta Política de Privacidad.
  <br><br>

  <dt class="heading-4">1. Información que recopilamos</dt>
  Podemos recopilar las siguientes categorías de información:
  <br><br>
  <dt class="heading-5">1.1 Información que usted proporciona directamente</dt>
  <ul class="list-marked">
      <li>Nombre o nombre de usuario</li>
      <li>Dirección de correo electrónico</li>
      <li>Contraseña (encriptada)</li>
      <li>Detalles del perfil (avatar, biografía, enlaces sociales)</li>
      <li>Publicaciones, comentarios y mensajes en el foro</li>
      <li>Subidas y metadatos del mercado</li>
      <li>Solicitudes de soporte o envíos de formularios</li>
  </ul>
  <br><br>
  <dt class="heading-5">1.2 Información recopilada automáticamente</dt>
  <ul class="list-marked">
      <li>Dirección IP</li>
      <li>Tipo y versión del navegador</li>
      <li>Información del dispositivo</li>
      <li>Sistema operativo</li>
      <li>URL de referencia</li>
      <li>Páginas visitadas y acciones realizadas</li>
      <li>Cookies e identificadores de seguimiento</li>
  </ul>
  <br><br>
  <dt class="heading-5">1.3 Información opcional</dt>
  <ul class="list-marked">
      <li>Suscripciones al boletín</li>
      <li>Preferencias de notificación</li>
      <li>Información del vendedor del mercado</li>
      <li>Información de pago (procesada por proveedores externos; no almacenamos datos de tarjetas)</li>
  </ul>
  <br><br>

  <dt class="heading-4">2. Cómo utilizamos su información</dt>
  Utilizamos su información para:
  <ul class="list-marked">
      <li>Crear y gestionar su cuenta</li>
      <li>Proporcionar acceso al foro, al mercado y a las funciones de la plataforma</li>
      <li>Personalizar su experiencia</li>
      <li>Mejorar nuestro sitio web y servicios</li>
      <li>Responder a las solicitudes de soporte</li>
      <li>Enviar notificaciones y actualizaciones (si están habilitadas)</li>
      <li>Prevenir el fraude, el abuso y las amenazas a la seguridad</li>
      <li>Cumplir con las obligaciones legales</li>
  </ul>
  No vendemos su información personal.
  <br><br>

  <dt class="heading-4">3. Bases legales para el procesamiento (GDPR/UK GDPR)</dt>
  Para los usuarios en la UE/Reino Unido, procesamos los datos bajo estas bases legales:
  <ul class="list-marked">
      <li><strong>Contrato</strong> — para proporcionarle acceso a la plataforma</li>
      <li><strong>Consentimiento</strong> — para boletines informativos, cookies, análisis</li>
      <li><strong>Interés legítimo</strong> — para proteger y mejorar la plataforma</li>
      <li><strong>Obligación legal</strong> — para cumplir con las leyes aplicables</li>
  </ul>
  Puede retirar su consentimiento en cualquier momento.
  <br><br>

  <dt class="heading-4">4. Cookies y tecnologías de seguimiento</dt>
  Utilizamos cookies para:
  <ul class="list-marked">
      <li>Recordar sus preferencias</li>
      <li>Mantener las sesiones de inicio de sesión</li>
      <li>Analizar el tráfico del sitio</li>
      <li>Mejorar la experiencia del usuario</li>
      <li>Habilitar la funcionalidad del mercado y del foro</li>
  </ul>
  Puede desactivar las cookies en la configuración de su navegador. Las cookies esenciales pueden ser necesarias para el funcionamiento de la plataforma.
  <br><br>

  <dt class="heading-4">5. Servicios de terceros</dt>
  Podemos utilizar proveedores de terceros de confianza para:
  <ul class="list-marked">
      <li>Análisis (por ejemplo, Google Analytics)</li>
      <li>Publicidad (por ejemplo, Google AdSense)</li>
      <li>Procesamiento de pagos</li>
      <li>Entrega de correo electrónico</li>
      <li>Sistemas de seguridad y antiabuso</li>
  </ul>
  Estos proveedores pueden utilizar cookies o tecnologías de seguimiento. No permitimos el seguimiento del comportamiento por parte de terceros más allá de lo necesario para análisis o anuncios.
  <br><br>

  <dt class="heading-4">6. Uso compartido de datos</dt>
  No vendemos ni comercializamos su información personal. Podemos compartir datos únicamente con:
  <ul class="list-marked">
      <li>Proveedores de servicios que actúan en nuestro nombre</li>
      <li>Autoridades legales cuando sea necesario</li>
      <li>Vendedores del mercado (limitado a la información relacionada con la compra)</li>
      <li>Socios de seguridad y prevención de fraudes</li>
  </ul>
  Todos los terceros deben cumplir con estrictos requisitos de confidencialidad y protección de datos.
  <br><br>

  <dt class="heading-4">7. Transferencias internacionales de datos</dt>
  Su información puede ser procesada en:
  <ul class="list-marked">
      <li>La Unión Europea</li>
      <li>Los Estados Unidos</li>
      <li>Otros países donde operan nuestros proveedores de servicios</li>
  </ul>
  Utilizamos salvaguardas legalmente reconocidas como:
  <ul class="list-marked">
      <li>Cláusulas Contractuales Estándar (SCC)</li>
      <li>Decisiones de adecuación</li>
      <li>Protecciones contractuales</li>
  </ul>
  <br><br>

  <dt class="heading-4">8. Retención de datos</dt>
  Conservamos su información únicamente durante el tiempo necesario para:
  <ul class="list-marked">
      <li>Prestar servicios</li>
      <li>Cumplir con las obligaciones legales</li>
      <li>Resolver disputas</li>
      <li>Hacer cumplir los acuerdos</li>
  </ul>
  Puede solicitar la eliminación de su cuenta en cualquier momento.
  <br><br>

  <dt class="heading-4">9. Medidas de seguridad</dt>
  Implementamos prácticas de seguridad estándar del sector:
  <ul class="list-marked">
      <li>Contraseñas encriptadas</li>
      <li>Cifrado SSL/TLS</li>
      <li>Escaneo de firewall y malware</li>
      <li>Acceso limitado a datos personales</li>
      <li>Auditorías de seguridad periódicas</li>
      <li>Pasarelas de pago seguras (no almacenamos datos de tarjetas)</li>
  </ul>
  Ningún sistema es 100% seguro, pero tomamos medidas razonables para proteger su información.
  <br><br>

  <dt class="heading-4">10. Sus derechos</dt>
  <dt class="heading-5">Usuarios de la UE/Reino Unido (GDPR)</dt>
  Tiene derecho a:
  <ul class="list-marked">
      <li>Acceder a sus datos</li>
      <li>Corregir datos inexactos</li>
      <li>Eliminar sus datos (“derecho al olvido”)</li>
      <li>Restringir el procesamiento</li>
      <li>Oponerse al procesamiento</li>
      <li>Portabilidad de datos</li>
      <li>Retirar el consentimiento</li>
  </ul>
  <br><br>
  <dt class="heading-5">Usuarios de California (CCPA/CPRA)</dt>
  Tiene derecho a:
  <ul class="list-marked">
      <li>Saber qué datos se recopilan</li>
      <li>Solicitar la eliminación</li>
      <li>Optar por no compartir datos</li>
      <li>No discriminación por ejercer sus derechos</li>
  </ul>
  <br><br>
  <dt class="heading-5">Canadá (PIPEDA)</dt>
  Tiene derecho a:
  <ul class="list-marked">
      <li>Acceder a sus datos</li>
      <li>Impugnar la exactitud</li>
      <li>Retirar el consentimiento</li>
  </ul>
  <br><br>
  <dt class="heading-5">Australia</dt>
  Tiene derecho a:
  <ul class="list-marked">
      <li>Acceder a la información personal y corregirla</li>
      <li>Presentar quejas sobre el mal uso</li>
  </ul>
  Para ejercer cualquier derecho, contáctenos a través de la página de <a href="/es/contact">Contacto</a>.
  <br><br>

  <dt class="heading-4">11. Privacidad infantil (COPPA)</dt>
  No recopilamos a sabiendas información de niños menores de 13 años. Si nos enteramos de que un niño menor de 13 años ha creado una cuenta, la eliminaremos de inmediato.
  <br><br>

  <dt class="heading-4">12. No rastrear (DNT)</dt>
  Respetamos las señales de No rastrear (DNT) cuando sea técnicamente viable.
  <br><br>

  <dt class="heading-4">13. Notificación de brecha de datos</dt>
  Si se produce una brecha de datos, notificaremos a los usuarios afectados:
  <ul class="list-marked">
      <li>A través de correo electrónico o notificación en el sitio</li>
      <li>Dentro de un plazo razonable (generalmente dentro de los 7 días hábiles)</li>
  </ul>
  <br><br>

  <dt class="heading-4">14. Cumplimiento de correo electrónico y comunicaciones (CAN-SPAM)</dt>
  Aceptamos:
  <ul class="list-marked">
      <li>No utilizar asuntos ni información del remitente engañosos</li>
      <li>Proporcionar una opción clara para darse de baja</li>
      <li>Atender las solicitudes de cancelación de suscripción de inmediato</li>
  </ul>
  Puede darse de baja en cualquier momento.
  <br><br>

  <dt class="heading-4">15. Cambios en esta Política de Privacidad</dt>
  Es posible que actualicemos esta Política de Privacidad periódicamente. Los cambios se publicarán en esta página con una fecha de “Última actualización” actualizada.
  <br><br>

  <dt class="heading-4">16. Contáctenos</dt>
  Si tiene preguntas sobre esta Política de Privacidad, puede contactarnos utilizando el formulario de <a href="/es/contact">Contacto</a> en el sitio web.
  <br>