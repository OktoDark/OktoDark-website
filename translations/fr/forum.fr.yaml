            question: "<h3>Le problème</h3><p>Décrivez exactement ce que vous essayez d'accomplir ou ce qui ne fonctionne pas.</p><h3>Ce que j'ai essayé</h3><p>Listez les solutions ou contournements que vous avez déjà tentés.</p>"