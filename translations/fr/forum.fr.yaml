        template:
            bug_report: "<h3>Description du bug</h3><p>Une description claire et concise du bug.</p><h3>Étapes pour reproduire</h3><ol><li>Aller à '...'</li><li>Cliquer sur '....'</li><li>Faire défiler jusqu'à '....'</li><li>Voir l'erreur</li></ol><h3>Comportement attendu</h3><p>Une description claire et concise de ce que vous attendiez.</p><h3>Captures d'écran</h3><p>Le cas échéant, ajoutez des captures d'écran pour expliquer votre problème.</p>"
