faq.one_title_txt: "Que puis-je faire pour avoir accès à ce site ?"
faq.one_content_txt: |
  Vous devez être un patron ou un donateur, et nous envoyer un message en utilisant le formulaire de contact
  ou un message privé sur notre page <a href="https://facebook.com/OktoDark">Facebook</a>
  avec votre vrai nom.
  <br>Le compte pour notre site sera envoyé à votre email avec tous les détails de connexion.

faq.two_title_txt: "Que signifie le système de vote ?"
faq.two_content_txt: >
  À partir du Tier II, n'importe qui peut voter sur les personnages, le monde du jeu, etc.
  Tout le monde est impliqué dans le développement.

faq.three_title_txt: "Expliquez-moi plus sur le système de vote, s'il vous plaît"
faq.three_content_txt: |
  Vous devez être un patron ou un donateur pour voir le système de vote. C'est secret.
  <i class="fas fa-user-ninja"></i>