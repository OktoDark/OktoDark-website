privacy.subtitle: "Découvrez comment nous collectons, utilisons, stockons et protégeons vos informations personnelles."
privacy.section: |
  <p class="text-light small mb-4">
    Dernière mise à jour : 29.05.2029
  </p>

  Cette Politique de Confidentialité explique comment OktoDark Studios (« nous », « notre ») collecte, utilise, stocke et protège vos informations personnelles lorsque vous utilisez notre site web, forum, marketplace, blog ou tout service associé (« Plateforme »). Nous respectons les principales réglementations mondiales en matière de confidentialité, notamment :
  <ul class="list-marked">
      <li>Règlement général sur la protection des données de l'UE (RGPD)</li>
      <li>RGPD du Royaume-Uni</li>
      <li>California Consumer Privacy Act (CCPA/CPRA)</li>
      <li>California Online Privacy Protection Act (CalOPPA)</li>
      <li>Children's Online Privacy Protection Act (COPPA)</li>
      <li>Principes de confidentialité fédéraux et étatiques des États-Unis</li>
      <li>LPRPDE du Canada</li>
      <li>Loi australienne sur la protection de la vie privée</li>
      <li>Exigences relatives aux transferts internationaux de données</li>
  </ul>
  En utilisant notre Plateforme, vous acceptez les pratiques décrites dans cette Politique de Confidentialité.
  <br><br>

  <dt class="heading-4">1. Informations que nous collectons</dt>
  Nous pouvons collecter les catégories d'informations suivantes :
  <br><br>
  <dt class="heading-5">1.1 Informations que vous fournissez directement</dt>
  <ul class="list-marked">
      <li>Nom ou nom d'utilisateur</li>
      <li>Adresse e-mail</li>
      <li>Mot de passe (chiffré)</li>
      <li>Détails du profil (avatar, biographie, liens sociaux)</li>
      <li>Publications du forum, commentaires, messages</li>
      <li>Téléversements sur le marketplace et métadonnées</li>
      <li>Demandes de support ou soumissions de formulaires</li>
  </ul>
  <br><br>
  <dt class="heading-5">1.2 Informations collectées automatiquement</dt>
  <ul class="list-marked">
      <li>Adresse IP</li>
      <li>Type et version du navigateur</li>
      <li>Informations sur l'appareil</li>
      <li>Système d'exploitation</li>
      <li>URLs de référence</li>
      <li>Pages visitées et actions effectuées</li>
      <li>Cookies et identifiants de suivi</li>
  </ul>
  <br><br>
  <dt class="heading-5">1.3 Informations optionnelles</dt>
  <ul class="list-marked">
      <li>Abonnements aux newsletters</li>
      <li>Préférences de notification</li>
      <li>Informations sur les vendeurs du marketplace</li>
      <li>Informations de paiement (traitées par des prestataires tiers ; nous ne stockons pas les données de carte)</li>
  </ul>
  <br><br>

  <dt class="heading-4">2. Comment nous utilisons vos informations</dt>
  Nous utilisons vos informations pour :
  <ul class="list-marked">
      <li>Créer et gérer votre compte</li>
      <li>Vous donner accès au forum, au marketplace et aux fonctionnalités de la plateforme</li>
      <li>Personnaliser votre expérience</li>
      <li>Améliorer notre site web et nos services</li>
      <li>Répondre aux demandes de support</li>
      <li>Envoyer des notifications et des mises à jour (si activées)</li>
      <li>Prévenir la fraude, les abus et les menaces de sécurité</li>
      <li>Respecter les obligations légales</li>
  </ul>
  Nous ne vendons pas vos informations personnelles.
  <br><br>

  <dt class="heading-4">3. Bases légales du traitement (RGPD / RGPD du Royaume-Uni)</dt>
  Pour les utilisateurs de l'UE/Royaume-Uni, nous traitons les données sur les bases légales suivantes :
  <ul class="list-marked">
      <li><strong>Contrat</strong> — pour vous donner accès à la plateforme</li>
      <li><strong>Consentement</strong> — pour les newsletters, cookies et analyses</li>
      <li><strong>Intérêt légitime</strong> — pour sécuriser et améliorer la plateforme</li>
      <li><strong>Obligation légale</strong> — pour respecter les lois applicables</li>
  </ul>
  Vous pouvez retirer votre consentement à tout moment.
  <br><br>

  <dt class="heading-4">4. Cookies & Technologies de suivi</dt>
  Nous utilisons des cookies pour :
  <ul class="list-marked">
      <li>Mémoriser vos préférences</li>
      <li>Maintenir les sessions de connexion</li>
      <li>Analyser le trafic du site</li>
      <li>Améliorer l'expérience utilisateur</li>
      <li>Activer les fonctionnalités du marketplace et du forum</li>
  </ul>
  Vous pouvez désactiver les cookies dans les paramètres de votre navigateur. Les cookies essentiels peuvent être nécessaires au bon fonctionnement de la plateforme.
  <br><br>

  <dt class="heading-4">5. Services tiers</dt>
  Nous pouvons faire appel à des prestataires tiers de confiance pour :
  <ul class="list-marked">
      <li>Analyses (ex. : Google Analytics)</li>
      <li>Publicité (ex. : Google AdSense)</li>
      <li>Traitement des paiements</li>
      <li>Envoi d'e-mails</li>
      <li>Systèmes de sécurité et anti-abus</li>
  </ul>
  Ces prestataires peuvent utiliser des cookies ou des technologies de suivi. Nous n'autorisons pas le suivi comportemental par des tiers au-delà de ce qui est nécessaire pour les analyses ou la publicité.
  <br><br>

  <dt class="heading-4">6. Partage des données</dt>
  Nous ne vendons ni n'échangeons vos informations personnelles. Nous pouvons partager des données uniquement avec :
  <ul class="list-marked">
      <li>Des prestataires de services agissant en notre nom</li>
      <li>Les autorités légales lorsque cela est requis</li>
      <li>Les vendeurs du marketplace (limité aux informations liées aux achats)</li>
      <li>Des partenaires de sécurité et de prévention des fraudes</li>
  </ul>
  Tous les tiers doivent respecter des exigences strictes de confidentialité et de protection des données.
  <br><br>

  <dt class="heading-4">7. Transferts internationaux de données</dt>
  Vos informations peuvent être traitées dans :
  <ul class="list-marked">
      <li>L'Union européenne</li>
      <li>Les États-Unis</li>
      <li>D'autres pays où opèrent nos prestataires de services</li>
  </ul>
  Nous utilisons des garanties légalement reconnues telles que :
  <ul class="list-marked">
      <li>Clauses contractuelles types (CCT)</li>
      <li>Décisions d'adéquation</li>
      <li>Protections contractuelles</li>
  </ul>
  <br><br>

  <dt class="heading-4">8. Conservation des données</dt>
  Nous conservons vos informations uniquement le temps nécessaire pour :
  <ul class="list-marked">
      <li>Fournir les services</li>
      <li>Respecter les obligations légales</li>
      <li>Résoudre les litiges</li>
      <li>Faire respecter les accords</li>
  </ul>
  Vous pouvez demander la suppression de votre compte à tout moment.
  <br><br>

  <dt class="heading-4">9. Mesures de sécurité</dt>
  Nous appliquons des pratiques de sécurité conformes aux normes du secteur :
  <ul class="list-marked">
      <li>Mots de passe chiffrés</li>
      <li>Chiffrement SSL/TLS</li>
      <li>Pare-feu et analyse des malwares</li>
      <li>Accès limité aux données personnelles</li>
      <li>Audits de sécurité réguliers</li>
      <li>Passerelles de paiement sécurisées (nous ne stockons pas les données de carte)</li>
  </ul>
  Aucun système n'est sécurisé à 100 %, mais nous prenons des mesures raisonnables pour protéger vos informations.
  <br><br>

  <dt class="heading-4">10. Vos droits</dt>
  <dt class="heading-5">Utilisateurs UE/Royaume-Uni (RGPD)</dt>
  Vous avez le droit de :
  <ul class="list-marked">
      <li>Accéder à vos données</li>
      <li>Corriger des données inexactes</li>
      <li>Supprimer vos données (« droit à l'oubli »)</li>
      <li>Limiter le traitement</li>
      <li>Vous opposer au traitement</li>
      <li>Portabilité des données</li>
      <li>Retirer votre consentement</li>
  </ul>
  <br><br>
  <dt class="heading-5">Utilisateurs de Californie (CCPA/CPRA)</dt>
  Vous avez le droit de :
  <ul class="list-marked">
      <li>Savoir quelles données sont collectées</li>
      <li>Demander la suppression</li>
      <li>Refuser le partage de données</li>
      <li>Ne pas être discriminé pour l'exercice de vos droits</li>
  </ul>
  <br><br>
  <dt class="heading-5">Canada (LPRPDE)</dt>
  Vous avez le droit de :
  <ul class="list-marked">
      <li>Accéder à vos données</li>
      <li>Contester l'exactitude des données</li>
      <li>Retirer votre consentement</li>
  </ul>
  <br><br>
  <dt class="heading-5">Australie</dt>
  Vous avez le droit de :
  <ul class="list-marked">
      <li>Accéder à vos informations personnelles et les corriger</li>
      <li>Déposer des plaintes relatives à une utilisation abusive</li>
  </ul>
  Pour exercer l'un de ces droits, contactez-nous via la page <a href="/fr/contact">Contact</a>.
  <br><br>

  <dt class="heading-4">11. Confidentialité des enfants (COPPA)</dt>
  Nous ne collectons pas sciemment d'informations auprès d'enfants de moins de 13 ans. Si nous apprenons qu'un enfant de moins de 13 ans a créé un compte, nous le supprimerons rapidement.
  <br><br>

  <dt class="heading-4">12. Ne pas me suivre (DNT)</dt>
  Nous respectons les signaux Do Not Track dans la mesure du possible sur le plan technique.
  <br><br>

  <dt class="heading-4">13. Notification de violation de données</dt>
  En cas de violation de données, nous en informerons les utilisateurs concernés :
  <ul class="list-marked">
      <li>Par e-mail ou notification sur le site</li>
      <li>Dans un délai raisonnable (généralement sous 7 jours ouvrés)</li>
  </ul>
  <br><br>

  <dt class="heading-4">14. Conformité e-mail & communications (CAN-SPAM)</dt>
  Nous nous engageons à :
  <ul class="list-marked">
      <li>Ne pas utiliser d'objets ou d'informations d'expéditeur trompeurs</li>
      <li>Proposer une option de désinscription claire</li>
      <li>Traiter les demandes de désinscription rapidement</li>
  </ul>
  Vous pouvez vous désinscrire à tout moment.
  <br><br>

  <dt class="heading-4">15. Modifications de cette Politique de Confidentialité</dt>
  Nous pouvons mettre à jour cette Politique de Confidentialité périodiquement. Les modifications seront publiées sur cette page avec une date « Dernière mise à jour » actualisée.
  <br><br>

  <dt class="heading-4">16. Nous contacter</dt>
  Si vous avez des questions concernant cette Politique de Confidentialité, vous pouvez nous contacter via le formulaire <a href="/fr/contact">Contact</a> sur le site web.
  <br>