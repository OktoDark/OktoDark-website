# Korean Streaming Translations
streaming:
    title: "라이브 스트리밍"
    twitch_desc: "스트리밍 메인 채널입니다."
    discord_desc: "제안/버그 보고 및 기타 토론을 위해 Discord가 최고의 소통 수단입니다."
    x_desc: "모든 시청자와 팔로워를 위한 빠르고 깔끔한 메시지."
    faq:
        title: "자주 묻는 질문"
        q1: "스트리밍에서 무엇을 볼 수 있고 어디서 볼 수 있나요?"
        a1: "스트리밍에서는 Twitch 채널에서만 3D 모델링, 게임 제작 등을 볼 수 있습니다."
        q2: "시청은 무료인가요?"
        a2: "네, 무료입니다."
        q3: "스트리밍은 언제, 어느 요일에 시작하나요?"
        a3: "현재 스트리밍은 고정된 날짜가 없습니다."
        q4: "기부를 해야 하나요?"
        a4: "원하신다면 구독(지원하기 메뉴 링크 참조) 또는 다른 방법으로 채널을 도울 수 있지만, 자유입니다."
