privacy.subtitle: "개인 정보 수집, 사용, 저장 및 보호 방법을 확인하세요."
privacy.section: |
  <p class="text-light small mb-4">
    최종 업데이트: 2026.05.29
  </p>

  이 개인정보처리방침은 OktoDark Studios(“회사” 또는 “우리”)가 당사의 웹사이트, 포럼, 마켓플레이스, 블로그 또는 관련 서비스(“플랫폼”)를 이용할 때 귀하의 개인 정보를 수집, 사용, 저장 및 보호하는 방법을 설명합니다. 당사는 다음과 같은 주요 글로벌 개인정보보호 규정을 준수합니다.
  <ul class="list-marked">
      <li>EU 일반 개인정보보호법 (GDPR)</li>
      <li>UK GDPR</li>
      <li>캘리포니아 소비자 개인정보보호법 (CCPA/CPRA)</li>
      <li>캘리포니아 온라인 개인정보보호법 (CalOPPA)</li>
      <li>아동 온라인 개인정보보호법 (COPPA)</li>
      <li>미국 연방 및 주 개인정보보호 원칙</li>
      <li>캐나다 PIPEDA</li>
      <li>호주 개인정보보호법</li>
      <li>국제 데이터 전송 요구사항</li>
  </ul>
  본 개인정보처리방침에 설명된 관행에 동의하는 것으로 간주됩니다.
  <br><br>

  <dt class="heading-4">1. 수집하는 정보</dt>
  당사는 다음과 같은 범주의 정보를 수집할 수 있습니다.
  <br><br>
  <dt class="heading-5">1.1 귀하가 직접 제공하는 정보</dt>
  <ul class="list-marked">
      <li>이름 또는 사용자 이름</li>
      <li>이메일 주소</li>
      <li>비밀번호 (암호화됨)</li>
      <li>프로필 세부 정보 (아바타, 소개, 소셜 링크)</li>
      <li>포럼 게시물, 댓글, 메시지</li>
      <li>마켓플레이스 업로드 및 메타데이터</li>
      <li>지원 요청 또는 양식 제출</li>
  </ul>
  <br><br>
  <dt class="heading-5">1.2 자동으로 수집되는 정보</dt>
  <ul class="list-marked">
      <li>IP 주소</li>
      <li>브라우저 유형 및 버전</li>
      <li>장치 정보</li>
      <li>운영 체제</li>
      <li>참조 URL</li>
      <li>방문한 페이지 및 수행한 작업</li>
      <li>쿠키 및 추적 식별자</li>
  </ul>
  <br><br>
  <dt class="heading-5">1.3 선택적 정보</dt>
  <ul class="list-marked">
      <li>뉴스레터 구독</li>
      <li>알림 설정</li>
      <li>마켓플레이스 판매자 정보</li>
      <li>결제 정보 (제3자 제공업체가 처리합니다. 당사는 카드 데이터를 저장하지 않습니다.)</li>
  </ul>
  <br><br>

  <dt class="heading-4">2. 귀하의 정보를 사용하는 방법</dt>
  당사는 다음과 같은 목적으로 귀하의 정보를 사용합니다.
  <ul class="list-marked">
      <li>계정 생성 및 관리</li>
      <li>포럼, 마켓플레이스 및 플랫폼 기능 이용 제공</li>
      <li>사용자 경험 맞춤 설정</li>
      <li>웹사이트 및 서비스 개선</li>
      <li>지원 요청에 응답</li>
      <li>알림 및 업데이트 전송 (활성화된 경우)</li>
      <li>사기, 남용 및 보안 위협 방지</li>
      <li>법적 의무 준수</li>
  </ul>
  당사는 귀하의 개인 정보를 판매하지 않습니다.
  <br><br>

  <dt class="heading-4">3. 처리의 법적 근거 (GDPR/UK GDPR)</dt>
  EU/영국 사용자의 경우, 당사는 다음과 같은 법적 근거에 따라 데이터를 처리합니다.
  <ul class="list-marked">
      <li><strong>계약</strong> — 플랫폼 이용 제공</li>
      <li><strong>동의</strong> — 뉴스레터, 쿠키, 분석</li>
      <li><strong>정당한 이익</strong> — 플랫폼 보안 및 개선</li>
      <li><strong>법적 의무</strong> — 관련 법률 준수</li>
  </ul>
  언제든지 동의를 철회할 수 있습니다.
  <br><br>

  <dt class="heading-4">4. 쿠키 및 추적 기술</dt>
  당사는 다음과 같은 목적으로 쿠키를 사용합니다.
  <ul class="list-marked">
      <li>선호도 기억</li>
      <li>로그인 세션 유지</li>
      <li>사이트 트래픽 분석</li>
      <li>사용자 경험 개선</li>
      <li>마켓플레이스 및 포럼 기능 활성화</li>
  </ul>
  브라우저 설정에서 쿠키를 비활성화할 수 있습니다. 필수 쿠키는 플랫폼 기능에 필요할 수 있습니다.
  <br><br>

  <dt class="heading-4">5. 제3자 서비스</dt>
  당사는 다음과 같은 목적으로 신뢰할 수 있는 제3자 제공업체를 사용할 수 있습니다.
  <ul class="list-marked">
      <li>분석 (예: Google Analytics)</li>
      <li>광고 (예: Google AdSense)</li>
      <li>결제 처리</li>
      <li>이메일 전송</li>
      <li>보안 및 반‑남용 시스템</li>
  </ul>
  이 제공업체는 쿠키 또는 추적 기술을 사용할 수 있습니다. 당사는 분석 또는 광고에 필요한 범위를 넘어서는 제3자 행동 추적을 허용하지 않습니다.
  <br><br>

  <dt class="heading-4">6. 데이터 공유</dt>
  당사는 귀하의 개인 정보를 판매하거나 거래하지 않습니다. 당사는 다음 경우에만 데이터를 공유할 수 있습니다.
  <ul class="list-marked">
      <li>당사를 대신하여 행동하는 서비스 제공업체</li>
      <li>법적 당국 (요청 시)</li>
      <li>마켓플레이스 판매자 (구매 관련 정보로 제한)</li>
      <li>보안 및 사기 방지 파트너</li>
  </ul>
  모든 제3자는 엄격한 기밀 유지 및 데이터 보호 요구사항을 준수해야 합니다.
  <br><br>

  <dt class="heading-4">7. 국제 데이터 전송</dt>
  귀하의 정보는 다음 국가에서 처리될 수 있습니다.
  <ul class="list-marked">
      <li>유럽 연합</li>
      <li>미국</li>
      <li>서비스 제공업체가 운영되는 기타 국가</li>
  </ul>
  당사는 다음과 같은 법적으로 인정되는 보호 조치를 사용합니다.
  <ul class="list-marked">
      <li>표준 계약 조항 (SCCs)</li>
      <li>적정성 결정</li>
      <li>계약상의 보호</li>
  </ul>
  <br><br>

  <dt class="heading-4">8. 데이터 보존</dt>
  당사는 다음 목적을 위해 필요한 기간 동안만 귀하의 정보를 보유합니다.
  <ul class="list-marked">
      <li>서비스 제공</li>
      <li>법적 의무 준수</li>
      <li>분쟁 해결</li>
      <li>계약 이행</li>
  </ul>
  언제든지 계정 삭제를 요청할 수 있습니다.
  <br><br>

  <dt class="heading-4">9. 보안 조치</dt>
  당사는 다음과 같은 산업 표준 보안 관행을 구현합니다.
  <ul class="list-marked">
      <li>암호화된 비밀번호</li>
      <li>SSL/TLS 암호화</li>
      <li>방화벽 및 악성코드 검사</li>
      <li>개인 데이터에 대한 제한된 접근</li>
      <li>정기적인 보안 감사</li>
      <li>안전한 결제 게이트웨이 (당사는 카드 데이터를 저장하지 않습니다.)</li>
  </ul>
  어떤 시스템도 100% 안전하지는 않지만, 당사는 귀하의 정보를 보호하기 위해 합리적인 조치를 취합니다.
  <br><br>

  <dt class="heading-4">10. 귀하의 권리</dt>
  <dt class="heading-5">EU/UK 사용자 (GDPR)</dt>
  당신은 다음과 같은 권리를 갖습니다.
  <ul class="list-marked">
      <li>귀하의 데이터에 대한 접근</li>
      <li>부정확한 데이터 수정</li>
      <li>귀하의 데이터 삭제 (“잊힐 권리”)</li>
      <li>처리의 제한</li>
      <li>처리에 대한 반대</li>
      <li>데이터 이식성</li>
      <li>동의 철회</li>
  </ul>
  <br><br>
  <dt class="heading-5">캘리포니아 사용자 (CCPA/CPRA)</dt>
  당신은 다음과 같은 권리를 갖습니다.
  <ul class="list-marked">
      <li>수집되는 데이터에 대한 인지</li>
      <li>삭제 요청</li>
      <li>데이터 공유 거부</li>
      <li>권리 행사에 대한 비차별</li>
  </ul>
  <br><br>
  <dt class="heading-5">캐나다 (PIPEDA)</dt>
  당신은 다음과 같은 권리를 갖습니다.
  <ul class="list-marked">
      <li>귀하의 데이터에 대한 접근</li>
      <li>정확성에 대한 이의 제기</li>
      <li>동의 철회</li>
  </ul>
  <br><br>
  <dt class="heading-5">호주</dt>
  당신은 다음과 같은 권리를 갖습니다.
  <ul class="list-marked">
      <li>개인 정보 접근 및 수정</li>
      <li>오용에 대한 불만 제기</li>
  </ul>
  어떤 권리라도 행사하려면 <a href="/ko/contact">문의</a> 페이지를 통해 당사에 연락하십시오.
  <br><br>

  <dt class="heading-4">11. 아동 개인정보 보호 (COPPA)</dt>
  당사는 13세 미만 어린이로부터 의도적으로 정보를 수집하지 않습니다. 13세 미만 어린이가 계정을 생성한 것을 알게 되면 즉시 삭제할 것입니다.
  <br><br>

  <dt class="heading-4">12. 추적 금지 (DNT)</dt>
  당사는 기술적으로 가능한 범위 내에서 추적 금지 신호를 존중합니다.
  <br><br>

  <dt class="heading-4">13. 데이터 침해 통지</dt>
  데이터 침해가 발생하면 영향을 받은 사용자에게 다음을 통해 통지할 것입니다.
  <ul class="list-marked">
      <li>이메일 또는 현장 알림</li>
      <li>합리적인 기간 내 (보통 영업일 기준 7일 이내)</li>
  </ul>
  <br><br>

  <dt class="heading-4">14. 이메일 및 커뮤니케이션 규정 준수 (CAN‑SPAM)</dt>
  당사는 다음과 같이 동의합니다.
  <ul class="list-marked">
      <li>오해의 소지가 있는 제목이나 발신자 정보 사용 금지</li>
      <li>명확한 수신 거부 옵션 제공</li>
      <li>수신 거부 요청 즉시 존중</li>
  </ul>
  언제든지 수신 거부를 요청할 수 있습니다.
  <br><br>

  <dt class="heading-4">15. 이 개인정보 보호정책의 변경 사항</dt>
  당사는 주기적으로 이 개인정보 보호정책을 업데이트할 수 있습니다. 변경 사항은 업데이트된 “최종 업데이트” 날짜와 함께 이 페이지에 게시됩니다.
  <br><br>

  <dt class="heading-4">16. 문의하기</dt>
  이 개인정보 보호정책에 대한 질문이 있는 경우 웹사이트의 <a href="/ko/contact">문의</a> 양식을 통해 당사에 문의할 수 있습니다.
  <br>
