  <dt class="heading-5">2. 판매 자격</dt>
  <strong>Active account:</strong> 활성 OktoDark 계정이 양호한 상태여야 합니다.
  <br>
  <strong>Legal capacity:</strong> 귀하는 관할권 내에서 계약을 체결하고 대금을 수령할 법적 권한이 있어야 합니다.
  <br>
  <strong>Compliance:</strong> 저작권, 세금 및 수출 규정을 포함한 모든 해당 법률을 준수해야 합니다.
  <br>
  OktoDark Studios는 재량에 따라 판매자 자격을 승인, 제한 또는 취소할 수 있습니다.
  <br><br>

