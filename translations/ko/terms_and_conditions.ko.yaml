  <strong>구매자:</strong> 콘텐츠를 다운로드하거나 구매하는 모든 사용자.
  <br>
  <strong>콘텐츠:</strong> 판매자가 업로드한 모든 디지털 자산(모드, 도구, 테마, 스크립트, 리소스 또는 문서 포함).
  <br>
  <strong>플랫폼:</strong> OktoDark 웹사이트, 마켓플레이스 및 관련 서비스.
