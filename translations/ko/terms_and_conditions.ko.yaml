  <br><br>

  <dt class="heading-5">2. 라이선스 유형</dt>
  크리에이터는 다음 중에서 선택할 수 있습니다.
  <ul class="list-marked">
      <li>MIT 라이선스</li>
      <li>GPL / LGPL</li>
      <li>Creative Commons (CC‑BY, CC‑BY‑SA, CC‑BY‑NC 등)</li>
      <li>맞춤형 라이선스</li>
      <li>모든 권리 보유</li>
