      <li>라이선스가 허용하는 경우 수정할 수 있습니다.</li>
      <li>허용된 경우에만 재배포할 수 있습니다.</li>
  </ul>
  다음과 같은 행위는 금지됩니다.
  <ul class="list-marked">
      <li>저작권 고지 제거</li>
      <li>타인의 저작물 소유권 주장</li>
      <li>허용되지 않는 상업적 사용</li>
