  <dt class="heading-5">7. 지원 및 업데이트</dt>
  <strong>판매자 책임:</strong>
  <ul class="list-marked">
      <li>유료 콘텐츠에 대한 합리적인 지원(버그 수정, 설명, 기본 도움말)을 제공할 책임이 있습니다.</li>
      <li>지속적인 업데이트 또는 장기 지원을 광고하는 경우 이를 이행하기 위해 성실히 노력해야 합니다.</li>
  </ul>
  <strong>지원 종료:</strong>
  <ul class="list-marked">
      <li>귀하는 지원 또는 업데이트를 중단할 수 있지만 자산 설명에 그에 따라 업데이트해야 합니다.</li>
      <li>구매자는 달리 약속되지 않는 한 지원 종료만으로 자동적으로 환불받을 권리가 없습니다.</li>
  </ul>
