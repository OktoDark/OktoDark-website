  <br>
  <strong>OktoDark에 부여하는 권리:</strong> 콘텐츠를 업로드함으로써 OktoDark에 다음을 위한 비독점, 전 세계, 로열티 없는 라이선스를 부여합니다.
  <ul class="list-marked">
      <li>콘텐츠를 호스팅, 저장 및 표시</li>
