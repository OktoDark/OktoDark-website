  <dt class="heading-4">22. 마켓플레이스 판매자 계약 — OktoDark Studios</dt>
  본 마켓플레이스 판매자 계약("본 계약")은 OktoDark 마켓플레이스에서 판매자로 참여하는 것을 규율합니다. 플랫폼에 디지털 콘텐츠를 업로드, 리스팅 또는 판매함으로써 귀하는 본 약관, 마켓플레이스 규칙, 다운로드 라이선스 정책, 환불 정책 및 개인정보 처리방침 외에 본 계약에도 동의하게 됩니다.
