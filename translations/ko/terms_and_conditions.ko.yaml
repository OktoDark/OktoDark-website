terms_and_conditions.subtitle: "아래 이용 약관을 주의 깊게 읽어보시기 바랍니다."
terms_and_conditions.section: |
  <p class="text-light small mb-4">
    최종 업데이트: 2026.05.29
  </p>

  <dt class="heading-4">1. 소개</dt>
  OktoDark Studios에서 운영하는 디지털 플랫폼인 OktoDark에 오신 것을 환영합니다. 계정을 생성하거나, 웹사이트에 접속하거나, 콘텐츠를 다운로드하거나, 플랫폼의 기능(포럼, 마켓플레이스, 설치 프로그램, 업데이트 프로그램, 알림 또는 관련 서비스)을 사용하는 경우, 본 이용 약관에 동의하는 것으로 간주됩니다. 동의하지 않는 경우 플랫폼 사용을 중단해야 합니다.
  <br><br>

  <dt class="heading-4">2. 자격</dt>
  플랫폼을 사용하려면 다음 요구 사항을 충족해야 합니다.
  <ul class="list-marked">
      <li>만 13세 이상이어야 합니다.</li>
      <li>거주 지역의 온라인 서비스 사용에 대한 법적 허가를 받아야 합니다.</li>
      <li>본 이용 약관 및 <a href="/ko/privacy-policy">개인정보 처리방침</a>에 동의해야 합니다.</li>
  </ul>
  이 요구 사항을 위반하는 계정은 일시 중단되거나 종료될 수 있습니다.
  <br><br>

  <dt class="heading-4">3. 플랫폼 개요</dt>
  OktoDark은 다음 기능을 제공합니다.
  <ul class="list-marked">
      <li>게시판, 스레드, 토론이 있는 커뮤니티 포럼</li>
      <li>게시글을 작성하고 읽는 블로그 시스템</li>
      <li>사용자와 콘텐츠를 추적하는 팔로우 시스템</li>
      <li>알림 시스템(이메일 + 현장)</li>
      <li>역할 기반 권한 시스템</li>
      <li>사용자 프로필, 아바타, 서명 및 소셜 링크</li>
      <li>디지털 자산, 모드, 도구 및 다운로드를 위한 마켓플레이스</li>
      <li>버전 관리가 가능한 안전한 다운로드 시스템</li>
      <li>플랫폼 배포를 위한 설치 프로그램 및 업데이트 프로그램</li>
      <li>선택적 AI 지원 기능(모더레이션, 제안, 요약)</li>
  </ul>
  본 이용 약관은 현재 및 미래의 모든 기능에 적용됩니다.
  <br><br>

  <dt class="heading-4">4. 계정 등록</dt>
  계정을 생성할 때 다음 사항에 동의하는 것으로 간주됩니다.
  <ul class="list-marked">
      <li>정확한 정보 제공</li>
      <li>비밀번호 보안 유지</li>
      <li>계정 공유 금지</li>
      <li>타인 사칭 금지</li>
      <li>악용을 위한 다중 계정 생성 금지</li>
  </ul>
  귀하는 계정에서 발생하는 모든 활동에 대해 책임을 집니다.
  <br><br>

  <dt class="heading-4">5. 사용자 콘텐츠</dt>
  <dt class="heading-5">5.1 귀하의 콘텐츠</dt>
  귀하는 게시하거나 업로드하는 콘텐츠에 대한 소유권을 유지합니다. OktoDark에 게시함으로써 귀하는 다음을 위한 비독점적이고 전 세계적이며 로열티 없는 라이선스를 당사에 부여합니다.
  <ul class="list-marked">
      <li>표시</li>
      <li>저장</li>
      <li>배포</li>
      <li>수정(모더레이션 또는 포맷팅용)</li>
  </ul>
  귀하의 콘텐츠 또는 계정을 삭제하면 이 라이선스가 종료됩니다.
  <br><br>
  <dt class="heading-5">5.2 금지된 콘텐츠</dt>
  다음과 같은 콘텐츠를 업로드하거나 게시할 수 없습니다.
  <ul class="list-marked">
      <li>불법 콘텐츠</li>
      <li>증오심 표현, 괴롭힘 또는 협박</li>
      <li>NSFW 콘텐츠(지정된 구역에서 명시적으로 허용된 경우 제외)</li>
      <li>악성 코드, 익스플로잇 또는 유해 스크립트</li>
      <li>스팸, 광고 또는 허가 없는 자체 홍보</li>
      <li>귀하가 소유하지 않은 저작권 자료</li>
      <li>제3자 라이선스를 위반하는 자산</li>
  </ul>
  당사는 재량에 따라 콘텐츠를 제거하거나 접근을 제한할 수 있습니다.
  <br><br>

  <dt class="heading-4">6. 마켓플레이스 및 다운로드</dt>
  OktoDark 마켓플레이스를 통해 사용자는 다음을 수행할 수 있습니다.
  <ul class="list-marked">
      <li>디지털 자산(모드, 도구, 테마, 리소스) 업로드</li>
      <li>다른 사용자가 공유한 콘텐츠 다운로드</li>
      <li>버전이 지정된 파일 및 변경 로그 액세스</li>
      <li>크리에이터 팔로우 및 업데이트 수신</li>
  </ul>
  <dt class="heading-5">6.1 자산 업로드</dt>
  마켓플레이스에 업로드함으로써 귀하는 다음 사항을 확인합니다.
  <ul class="list-marked">
      <li>귀하는 콘텐츠에 대한 권리를 소유하고 있습니다.</li>
      <li>귀하는 이를 배포할 권한이 있습니다.</li>
      <li>귀하는 라이선스(MIT, GPL, CC, custom 등)를 명확하게 명시합니다.</li>
      <li>귀하의 업로드에는 유해하거나 악의적인 코드가 포함되어 있지 않습니다.</li>
      <li>귀하의 콘텐츠는 모든 적용 가능한 법률을 준수합니다.</li>
  </ul>
  당사는 재량에 따라 자산을 제거하거나 제한할 수 있습니다.
  <br><br>
  <dt class="heading-5">6.2 자산 다운로드</dt>
  콘텐츠를 다운로드할 때:
  <ul class="list-marked">
      <li>귀하는 크리에이터가 선택한 라이선스를 따르는 데 동의합니다.</li>
      <li>다운로드가 “있는 그대로” 제공된다는 점을 이해합니다.</li>
      <li>다운로드한 파일을 설치하거나 사용하는 것과 관련된 모든 위험을 감수합니다.</li>
  </ul>
  당사는 제3자 콘텐츠로 인한 손상에 대해 책임을 지지 않습니다.
  <br><br>
  <dt class="heading-5">6.3 유료 콘텐츠(활성화된 경우)</dt>
  마켓플레이스에 유료 항목이 포함된 경우:
  <ul class="list-marked">
      <li>결제는 제3자 결제 처리업체에서 처리합니다.</li>
      <li>환불은 처리업체의 정책을 따릅니다.</li>
      <li>사기 청구는 계정 제한으로 이어질 수 있습니다.</li>
  </ul>
  <br><br>
  <dt class="heading-5">6.4 자산 제거</dt>
  크리에이터는 언제든지 자산을 삭제할 수 있습니다. 하지만:
  <ul class="list-marked">
      <li>이전에 다운로드한 버전은 이미 다운로드한 사용자에게 계속 제공될 수 있습니다.</li>
      <li>보안 및 감사 목적으로 백업을 보관할 수 있습니다.</li>
  </ul>
  <br><br>

  <dt class="heading-4">7. 포럼 및 커뮤니티 규칙</dt>
  포럼을 사용함으로써 귀하는 다음 사항에 동의합니다.
  <ul class="list-marked">
      <li>다른 회원 존중</li>
      <li>게시판 내 주제 유지</li>
      <li>모더레이터 지침 준수</li>
      <li>방해 행동 자제</li>
      <li>팔로우 또는 알림 시스템 남용 금지</li>
  </ul>
  모더레이터는 게시물을 편집, 이동 또는 삭제할 수 있으며 경고 또는 차단을 할 수 있습니다.
  <br><br>

  <dt class="heading-4">8. 역할 및 권한</dt>
  플랫폼은 역할 기반 권한 시스템을 사용합니다.
  <ul class="list-marked">
      <li>역할은 수행할 수 있는 작업을 결정합니다.</li>
      <li>관리자는 역할을 할당, 수정 또는 취소할 수 있습니다.</li>
  </ul>
  권한을 우회하려는 시도는 엄격히 금지됩니다. 무단 접근 시도는 계정 해지로 이어질 수 있습니다.
  <br><br>

  <dt class="heading-4">9. 알림</dt>
  귀하는 다음을 받을 수 있습니다.
  <ul class="list-marked">
      <li>이메일 알림</li>
      <li>사이트 내 알림</li>
      <li>보안 경고</li>
      <li>시스템 메시지</li>
      <li>팔로우 업데이트</li>
      <li>마켓플레이스 업데이트 알림</li>
  </ul>
  알림 설정에서 선호도를 관리할 수 있습니다.
  <br><br>

  <dt class="heading-4">10. AI 지원 기능</dt>
  일부 기능은 AI를 사용하여 다음을 수행할 수 있습니다.
  <ul class="list-marked">
      <li>콘텐츠 제안</li>
      <li>요약</li>
      <li>모더레이션 지원</li>
      <li>자동 알림</li>
      <li>마켓플레이스 자산 분석</li>
  </ul>
  AI 출력은 항상 정확하지 않을 수 있습니다. 법률, 의료 또는 재정적 결정을 위해 AI 기능에 의존하지 않는 데 동의합니다.
  <br><br>

  <dt class="heading-4">11. 설치 프로그램 및 업데이트</dt>
  OktoDark 설치 프로그램이나 업데이트 프로그램을 사용하는 경우:
  <ul class="list-marked">
      <li>귀하는 서버 환경에 대한 책임이 있습니다.</li>
      <li>당사는 설치 또는 업데이트 중 데이터 손실에 대해 책임을 지지 않습니다.</li>
      <li>업데이트를 수행하기 전에 백업을 유지해야 합니다.</li>
      <li>시스템 파일 수정 시 지원이 무효화될 수 있습니다.</li>
      <li>자동 업데이트 기능은 신뢰할 수 있는 소스에서 파일을 다운로드할 수 있습니다.</li>
  </ul>
  <br><br>

  <dt class="heading-4">12. 보안</dt>
  당사는 데이터를 보호하기 위해 합당한 조치를 취하지만:
  <ul class="list-marked">
      <li>완전히 안전한 시스템은 없습니다.</li>
      <li>귀하는 기기와 비밀번호를 보호해야 합니다.</li>
      <li>의심스러운 활동을 즉시 신고해야 합니다.</li>
  </ul>
  플랫폼을 해킹, 악용 또는 방해하려는 시도는 엄격히 금지됩니다.
  <br><br>

  <dt class="heading-4">13. 제3자 서비스</dt>
  플랫폼은 다음과 같은 제3자 서비스와 통합될 수 있습니다.
  <ul class="list-marked">
      <li>소셜 로그인</li>
      <li>분석</li>
      <li>이메일 제공업체</li>
      <li>결제 처리업체</li>
      <li>AI 제공업체</li>
  </ul>
  당사는 제3자 서비스의 정책이나 행동에 대해 책임지지 않습니다.
  <br><br>

  <dt class="heading-4">14. 종료</dt>
  귀하가 다음을 수행하는 경우 계정을 일시 중단하거나 종료할 수 있습니다.
  <ul class="list-marked">
      <li>이 약관을 위반하는 경우</li>
      <li>플랫폼을 남용하는 경우</li>
      <li>시스템이나 커뮤니티에 해를 끼치려는 경우</li>
      <li>유해하거나 불법적인 콘텐츠를 업로드하는 경우</li>
      <li>사기성 마켓플레이스 활동에 참여하는 경우</li>
  </ul>
  귀하는 언제든지 계정을 삭제할 수 있습니다.
  <br><br>

  <dt class="heading-4">15. 책임 제한</dt>
  법률이 허용하는 최대 범위 내에서:
  <ul class="list-marked">
      <li>데이터 손실에 대해 책임지지 않습니다.</li>
      <li>서비스 중단에 대해 책임지지 않습니다.</li>
      <li>사용자가 생성한 콘텐츠에 대해 책임지지 않습니다.</li>
      <li>다운로드 또는 마켓플레이스 자산으로 인한 손상에 대해 책임지지 않습니다.</li>
      <li>제3자 통합으로 인한 문제에 대해 책임지지 않습니다.</li>
  </ul>
  플랫폼은 본인의 책임하에 사용하십시오.
  <br><br>

  <dt class="heading-4">16. 이 약관의 변경</dt>
  당사는 언제든지 이 약관을 업데이트할 수 있습니다. 변경 사항이 중요한 경우 사용자에게 다음을 통해 알립니다.
  <ul class="list-marked">
      <li>이메일</li>
      <li>사이트 내 알림</li>
      <li>시스템 공지</li>
  </ul>
  플랫폼을 계속 사용하면 업데이트된 약관에 동의하는 것으로 간주됩니다.
  <br><br>

  <dt class="heading-4">17. 문의</dt>
  질문이나 우려 사항이 있는 경우 <a href="/ko/contact">문의하기</a> 페이지를 통해 문의하십시오.
  <br><br>

  <dt class="heading-4">18. 마켓플레이스 규칙 (OktoDark 마켓플레이스)</dt>
  <dt class="heading-5">1. 소개</dt>
  OktoDark 마켓플레이스는 사용자가 모드, 도구, 테마, 리소스 등과 같은 디지털 자산을 업로드, 공유 및 다운로드할 수 있도록 허용합니다. 마켓플레이스를 사용함으로써 귀하는 기본 약관에 추가하여 이 규칙에 동의하는 것입니다.
  <br><br>

  <dt class="heading-5">2. 업로드 자격</dt>
  콘텐츠를 업로드하려면 다음을 수행해야 합니다.
  <ul class="list-marked">
      <li>콘텐츠에 대한 권리를 소유해야 합니다.</li>
      <li>배포 허가를 받아야 합니다.</li>
      <li>라이선스를 명확하게 명시해야 합니다(MIT, GPL, CC, 맞춤형 등).</li>
      <li>콘텐츠가 제3자의 권리를 침해하지 않아야 합니다.</li>
      <li>콘텐츠에 유해하거나 악성 코드가 포함되어 있지 않아야 합니다.</li>
  </ul>
  당사는 언제든지 소유권 또는 라이선스 증명을 요청할 수 있습니다.
  <br><br>

  <dt class="heading-5">3. 금지된 마켓플레이스 콘텐츠</dt>
  다음과 같은 콘텐츠는 업로드할 수 없습니다.
  <ul class="list-marked">
      <li>해적판 또는 도난된 콘텐츠</li>
      <li>상용 게임이나 소프트웨어에서 추출된 자산</li>
      <li>악성 코드, 바이러스 또는 유해 스크립트</li>
      <li>제3자의 권리를 침해하는 AI 생성 콘텐츠</li>
      <li>지정된 카테고리에서 명시적으로 허용되지 않는 NSFW 콘텐츠</li>
      <li>국내 또는 국제법을 위반하는 콘텐츠</li>
  </ul>
  <br><br>

  <dt class="heading-5">4. 버전 관리 및 업데이트</dt>
