  <dt class="heading-4">20. 저작권 정책</dt>
  <dt class="heading-5">1. 소개</dt>
  OktoDark은 지적 재산권을 존중하며 DMCA(디지털 밀레니엄 저작권법) 및 동등한 국제법을 준수합니다.
  <br><br>

  <dt class="heading-5">2. 저작권 침해 통지 제출</dt>
  저작권이 있는 저작물이 허가 없이 업로드되었다고 생각되는 경우 다음 정보를 포함한 제거 요청을 제출할 수 있습니다.
