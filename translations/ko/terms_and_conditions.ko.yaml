      <li>귀하의 성명</li>
      <li>연락처 정보</li>
      <li>저작권이 있는 저작물에 대한 설명</li>
      <li>침해 콘텐츠의 URL</li>
      <li>선의의 믿음 성명</li>
      <li>위증 처벌 하의 성명</li>
      <li>귀하의 실물 또는 전자 서명</li>
