faq.one_title_txt: "이 사이트에 접근하려면 어떻게 해야 하나요?"
faq.one_content_txt: |
  후원자 또는 기부자이어야 하며, 문의 양식을 사용하거나
  실명으로 <a href="https://facebook.com/OktoDark">Facebook</a> 페이지에 개인 메시지를 보내주세요.
  <br>사이트 계정은 모든 연결 정보와 함께 이메일로 전송됩니다.

faq.two_title_txt: "투표 시스템은 무엇을 의미하나요?"
faq.two_content_txt: >
  티어 II부터 캐릭터, 게임 세계 등에 투표할 수 있습니다.
  모든 사람이 개발에 참여합니다.

faq.three_title_txt: "투표 시스템에 대해 더 자세히 설명해 주세요"
faq.three_content_txt: |
  투표 시스템을 보려면 후원자 또는 기부자이어야 합니다. 비밀입니다.
  <i class="fas fa-user-ninja"></i>
